<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>感控問答擂台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>

        /* =====================================================================
           視覺主題：吉卜力風（柔和天空藍、草綠、奶油色、暖陽黃、薰衣草紫）。
           下面 :root 裡的顏色變數是整份樣式表唯一需要調色的地方，
           其餘規則都是透過 var(--xxx) 取用這裡定義好的顏色。
           ===================================================================== */
        @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Klee+One:wght@400;600&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

        :root {
            --sky: #BFE3EF;
            --sky-deep: #8FCADD;
            --leaf: #9AC9A0;
            --leaf-deep: #5FA179;
            --cream: #FFF8E9;
            --cream-deep: #F3E7C6;
            --sun: #FFD98A;
            --sun-deep: #F2A65A;
            --coral: #F3A6A0;
            --coral-deep: #E8867E;
            --lavender: #C9BFE0;
            --lavender-deep: #A797CC;
            --ink: #3E5C46;
            --slate: #7C9885;
            --card: #FFFDF6;
            --line: #EBE1C6;
            --good: #7FB06E;
            --bad: #E8867E;
            /* 保留舊變數名稱，讓下方規則沿用新色票 */
            --pink: #F3A6A0;
            --pink-dark: #E07A6E;
            --orange: #F2A65A;
            --purple: #7FA46B;
            --purple-dark: #4F7A52;
            --cyan: #8FCADD;
            --yellow: #FFD98A;
            --green: #7FB06E;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Noto Sans TC', sans-serif;
            color: var(--ink);
            background: radial-gradient(ellipse 340px 130px at 12% 10%, rgba(255,255,255,0.85), transparent 65%), radial-gradient(ellipse 260px 100px at 78% 6%, rgba(255,255,255,0.75), transparent 65%), radial-gradient(ellipse 220px 90px at 46% 22%, rgba(255,255,255,0.6), transparent 65%), linear-gradient(180deg, #BFE3EF 0%, #D7ECEE 30%, #EDEFD6 62%, #F5EAC8 100%);
            background-attachment: fixed;
            overflow-x: hidden;
            position: relative;
        }

        /* ---------- 背景裝飾：微風飄葉與雲朵 ---------- */
        .ghibli-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

            .ghibli-bg .hill {
                position: absolute;
                bottom: -60px;
                width: 140%;
                left: -20%;
                height: 220px;
                border-radius: 50%;
                background: var(--leaf);
                opacity: 0.55;
            }

                .ghibli-bg .hill.back {
                    bottom: -100px;
                    height: 260px;
                    background: #B7D9A8;
                    opacity: 0.5;
                }

            .ghibli-bg .drift {
                position: absolute;
                font-size: 1.6rem;
                opacity: 0.75;
                animation: driftAcross linear infinite;
                filter: drop-shadow(0 4px 6px rgba(60,80,50,0.15));
            }

        @keyframes driftAcross {
            0% {
                transform: translate(-8vw, 0) rotate(-6deg);
            }

            50% {
                transform: translate(50vw, -30px) rotate(8deg);
            }

            100% {
                transform: translate(110vw, 10px) rotate(-4deg);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .ghibli-bg .drift {
                animation: none;
            }
        }

        .wrap {
            max-width: 1120px;
            margin: 0 auto;
            padding: 22px 16px 60px;
            position: relative;
            z-index: 1;
        }

        /* ---------- 頂部品牌列 ---------- */
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 22px;
            justify-content: center;
        }

            .brand .mascot {
                font-size: 2.1rem;
                filter: drop-shadow(0 4px 8px rgba(95,161,121,0.4));
                animation: bounce 2.4s ease-in-out infinite;
            }

        @keyframes bounce {
            0%,100% {
                transform: translateY(0) rotate(-4deg);
            }

            50% {
                transform: translateY(-6px) rotate(4deg);
            }
        }

        .brand h1 {
            font-family: 'Klee One', 'Baloo 2', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            margin: 0;
            color: #2F4A38;
            text-shadow: 0 2px 0 rgba(255,255,255,0.6);
        }

        .brand .badge-live {
            font-family: 'Baloo 2', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--sun), var(--orange));
            color: #6B4423;
            padding: 4px 12px;
            border-radius: 999px;
            box-shadow: 0 4px 10px rgba(242,166,90,0.45);
        }

        /* ---------- 卡片 ---------- */
        .card {
            background: var(--card);
            border: 1.5px solid var(--line);
            border-radius: 28px;
            padding: 28px;
            box-shadow: 0 18px 38px -20px rgba(95,161,121,0.45), 0 6px 16px -8px rgba(140,120,80,0.15);
            position: relative;
            overflow: hidden;
            transition: box-shadow .2s ease, transform .2s ease;
        }

            .card::before {
                content: '🍃';
                position: absolute;
                top: -18px;
                right: -6px;
                font-size: 4.5rem;
                opacity: 0.14;
                transform: rotate(18deg);
                pointer-events: none;
            }

        .eyebrow {
            font-family: 'Baloo 2', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--leaf-deep);
            margin: 0 0 6px;
        }

        h2 {
            font-family: 'Klee One', 'Baloo 2', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            margin: 0 0 8px;
            color: var(--ink);
        }

        p.sub {
            color: var(--sun-deep);
            margin: 0 0 22px;
            line-height: 1.7;
            font-size: 1.3rem;
            font-weight: 700;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--slate);
            font-weight: 600;
            margin-bottom: 6px;
        }

        input[type=text] {
            width: 100%;
            padding: 15px 18px;
            border-radius: 16px;
            border: 2.5px solid var(--line);
            font-size: 1.5rem;
            font-family: inherit;
            background: #FFFDF6;
            color: var(--ink);
            transition: border-color .15s ease, box-shadow .15s ease;
        }

            input[type=text]:focus {
                outline: none;
                border-color: var(--leaf-deep);
                box-shadow: 0 0 0 4px rgba(95,161,121,0.18);
                background: #fff;
            }

        /* ---------- 按鈕 ---------- */
        .btn {
            appearance: none;
            border: none;
            cursor: pointer;
            font-family: 'Baloo 2', sans-serif;
            font-weight: 700;
            font-size: 1.05rem;
            border-radius: 16px;
            padding: 15px 22px;
            position: relative;
            overflow: hidden;
            transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
        }

            .btn:hover {
                transform: translateY(-2px);
            }

            .btn:active {
                transform: scale(0.96);
            }

        .btn-primary {
            background: linear-gradient(135deg, var(--sun), var(--leaf-deep));
            color: #fff;
            box-shadow: 0 10px 22px -8px rgba(95,161,121,0.55);
        }

            .btn-primary:hover {
                filter: brightness(1.06);
                box-shadow: 0 14px 26px -8px rgba(95,161,121,0.6);
            }

        .btn-block {
            width: 100%;
            margin-top: 18px;
            font-size: 1.5rem;
        }

        .btn-ghost {
            background: transparent;
            color: var(--slate);
            border: 2px solid var(--line);
            font-weight: 600;
            font-size: 0.9rem;
        }

            .btn-ghost:hover {
                border-color: var(--leaf-deep);
                color: var(--leaf-deep);
            }

        .foot-link {
            margin-top: 18px;
            text-align: center;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px 16px;
        }

            .foot-link button {
                background: none;
                border: none;
                color: var(--slate);
                font-size: 0.75rem;
                text-decoration: underline;
                cursor: pointer;
                font-family: inherit;
            }

        /* ---------- 漣漪互動效果 ---------- */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.55);
            transform: scale(0);
            animation: rippleAnim .6s ease-out forwards;
            pointer-events: none;
        }

        @keyframes rippleAnim {
            to {
                transform: scale(2.6);
                opacity: 0;
            }
        }

        /* ---------- 分數圓盤 ---------- */
        .dial-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px;
        }

        .dial {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            border-radius: 50%;
            background: conic-gradient(var(--sun) 0deg, var(--leaf) 180deg, var(--sky-deep) 360deg);
            padding: 7px;
            box-shadow: 0 12px 26px -10px rgba(95,161,121,0.5);
            transition: box-shadow .3s ease;
        }

            .dial::after {
                content: '';
                position: absolute;
                inset: 7px;
                border-radius: 50%;
                background: #fff;
            }

        .dial-inner {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .dial.flash-correct {
            animation: pulseGood .7s ease-out;
        }

        .dial.flash-wrong {
            animation: pulseBad .7s ease-out;
        }

        @keyframes pulseGood {
            0% {
                box-shadow: 0 0 0 0 rgba(127,176,110,0.55);
            }

            100% {
                box-shadow: 0 0 0 30px rgba(127,176,110,0);
            }
        }

        @keyframes pulseBad {
            0% {
                box-shadow: 0 0 0 0 rgba(232,134,126,0.55);
            }

            100% {
                box-shadow: 0 0 0 30px rgba(232,134,126,0);
            }
        }

        .dial-score {
            font-family: 'Baloo 2', sans-serif;
            font-size: 2.7rem;
            font-weight: 800;
            color: var(--ink);
            transition: color .2s ease;
        }

        .dial-label {
            font-size: 1.3rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--slate);
            font-weight: 600;
        }

        .flash-correct .dial-score {
            color: var(--good);
        }

        .flash-wrong .dial-score {
            color: var(--bad);
        }

        .progress-wrap {
            font-family: 'Baloo 2', sans-serif;
            font-size: 1.2rem;
            color: var(--ink);
            text-align: center;
            margin-bottom: 18px;
            font-weight: 600;
        }

            .progress-wrap .name-chip {
                display: inline-block;
                background: var(--line);
                color: var(--leaf-deep);
                padding: 3px 12px;
                border-radius: 999px;
                margin-left: 4px;
            }

        .progress-bar-track {
            height: 12px;
            border-radius: 999px;
            background: var(--line);
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--sun), var(--sun-deep));
            transition: width .35s ease;
            border-radius: 999px;
        }

        /* ---------- 題目卡 ---------- */
        .qcard {
            background: linear-gradient(180deg, #FFFDF3, #FFF3D9);
            border: 2px solid var(--line);
            border-radius: 22px;
            padding: 26px;
            margin-bottom: 22px;
        }

        .qpoints {
            display: inline-block;
            font-family: 'Baloo 2', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: #fff;
            background: linear-gradient(135deg, var(--leaf-deep), var(--sky-deep));
            border-radius: 999px;
            padding: 5px 16px;
            margin-bottom: 16px;
            box-shadow: 0 6px 14px -4px rgba(95,161,121,0.45);
        }

        .qtext {
            font-size: 1.7rem;
            line-height: 1.75;
            font-weight: 600;
            color: var(--ink);
        }

        .answers {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .ans-btn {
            padding: 22px 10px;
            border-radius: 18px;
            border: none;
            font-family: 'Baloo 2', sans-serif;
            font-weight: 800;
            font-size: 1.9rem;
            cursor: pointer;
            color: #fff;
            position: relative;
            overflow: hidden;
            transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
        }

            .ans-btn.true {
                background: linear-gradient(135deg, #9AC9A0, var(--leaf-deep));
                box-shadow: 0 10px 22px -8px rgba(95,161,121,0.55);
            }

            .ans-btn.false {
                background: linear-gradient(135deg, #F3B3A6, var(--coral-deep));
                box-shadow: 0 10px 22px -8px rgba(232,134,126,0.55);
            }

            .ans-btn:hover:not(:disabled) {
                filter: brightness(1.06);
                transform: translateY(-2px);
            }

            .ans-btn:active:not(:disabled) {
                transform: scale(0.95);
            }

            .ans-btn:disabled {
                opacity: 0.45;
                cursor: not-allowed;
                transform: none;
            }

        .feedback {
            text-align: center;
            font-family: 'Baloo 2', sans-serif;
            font-size: 1rem;
            min-height: 24px;
            margin-top: 16px;
            font-weight: 700;
            color: var(--leaf-deep);
        }

            .feedback.ok {
                color: var(--good);
            }

            .feedback.no {
                color: var(--bad);
            }

        /* ---------- 結算畫面 ---------- */
        .end-stats {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 12px;
            margin: 22px 0;
        }

        .stat {
            background: linear-gradient(180deg,#FFFDF3,#FFF3D9);
            border: 2px solid var(--line);
            border-radius: 16px;
            padding: 18px 8px;
            text-align: center;
        }

            .stat .num {
                font-family: 'Baloo 2', sans-serif;
                font-size: 1.6rem;
                font-weight: 800;
                color: var(--leaf-deep);
            }

            .stat .lbl {
                font-size: 0.72rem;
                color: var(--slate);
                margin-top: 4px;
                font-weight: 600;
            }

        .trophy {
            font-size: 4rem;
            text-align: center;
            display: block;
            margin-bottom: 6px;
            filter: drop-shadow(0 6px 10px rgba(242,166,90,0.4));
            animation: bounce 2.4s ease-in-out infinite;
        }

        .closed-msg {
            background: #FFF3D9;
            border: 2px dashed var(--sun-deep);
            border-radius: 16px;
            padding: 18px;
            text-align: center;
            font-weight: 700;
            color: #8A5B24;
            margin-bottom: 6px;
            font-family: 'Baloo 2', sans-serif;
        }

        /* ---------- 選擇題按鈕 ---------- */
        .choice-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .choice-btn {
            display: flex;
            align-items: center;
            text-align: left;
            width: 100%;
            padding: 15px 18px;
            border-radius: 16px;
            border: 2.5px solid var(--line);
            background: #FFFDF6;
            font-family: 'Noto Sans TC', sans-serif;
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--ink);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all .12s ease;
        }

            .choice-btn:hover:not(:disabled) {
                border-color: var(--leaf-deep);
                background: #F3F6EC;
                transform: translateY(-2px);
                box-shadow: 0 8px 16px -10px rgba(95,161,121,0.35);
            }

            .choice-btn:disabled {
                cursor: not-allowed;
            }

            .choice-btn.correct {
                background: linear-gradient(135deg, #9AC9A0, var(--leaf-deep));
                border-color: var(--leaf-deep);
                color: #fff;
            }

            .choice-btn.wrong-selected {
                background: linear-gradient(135deg, #F3B3A6, var(--coral-deep));
                border-color: var(--coral-deep);
                color: #fff;
            }

            .choice-btn.selected {
                background: #F3F6EC;
                border-color: var(--leaf-deep);
                color: var(--ink);
            }

        .choice-letter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--leaf-deep);
            color: #fff;
            font-family: 'Baloo 2', sans-serif;
            font-weight: 800;
            font-size: 0.78rem;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .choice-btn.correct .choice-letter,
        .choice-btn.wrong-selected .choice-letter {
            background: rgba(255,255,255,0.35);
        }

        /* ---------- 答錯率長條圖 ---------- */
        .stat-bar-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 11px;
        }

        .stat-bar-label {
            width: 108px;
            flex-shrink: 0;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--ink);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: help;
        }

        .stat-bar-track {
            flex: 1;
            height: 14px;
            border-radius: 999px;
            background: var(--line);
            overflow: hidden;
        }

        .stat-bar-fill {
            height: 100%;
            border-radius: 999px;
            transition: width .4s ease;
        }

        .stat-bar-pct {
            width: 40px;
            text-align: right;
            font-family: 'Baloo 2', sans-serif;
            font-weight: 800;
            font-size: 0.78rem;
            flex-shrink: 0;
        }

        @media(max-width:575px) {
            .answers {
                gap: 10px;
            }

            .ans-btn {
                font-size: 1.5rem;
                padding: 18px 6px;
            }

            h2 {
                font-size: 1.35rem;
            }
        }
    </style>
</head>
<body>
    <div class="ghibli-bg" aria-hidden="true">
        <div class="hill back"></div>
        <div class="hill"></div>
        <span class="drift" style="top:8%; animation-duration:26s; animation-delay:0s;">☁️</span>
        <span class="drift" style="top:18%; animation-duration:34s; animation-delay:-8s;">🍃</span>
        <span class="drift" style="top:5%; animation-duration:40s; animation-delay:-20s;">☁️</span>
        <span class="drift" style="top:28%; animation-duration:22s; animation-delay:-4s;">🌿</span>
        <span class="drift" style="top:14%; animation-duration:30s; animation-delay:-14s;">🍃</span>
    </div>
    <div class="wrap">
        <div class="brand">
            <span class="mascot">🧼</span>
            <h1>感控問答擂台</h1>
            <span class="badge-live">即時挑戰</span>
        </div>
        <div id="app"></div>
    </div>
    <script>
        /* =====================================================================
           Google Apps Script 設定 — 請依照 README.md 的步驟部署好 Apps Script
           後，把下面的網址換成你自己的 Web App 網址（結尾是 /exec）。
           ===================================================================== */
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzEJaUPK5WnOauCcXmz0yYlV3alPNa447UC04tNAdwAaJKotixd3Sc6yXCn8jq5Me8ljw/exec";

        /* 房間代碼：同一份 HTML 部署給不同場次/單位使用時，改這個字串即可
           讓彼此的排行榜互相獨立，不會混在一起。 */
        const ROOM_ID = "default-room";

        // 把玩家名稱轉成安全的 key（拿掉特殊符號），用來當作後端儲存的識別碼
        function sanitizeKey(s) {
            return String(s).replace(/[^a-zA-Z0-9_\u4e00-\u9fff-]/g, '_');
        }

        // 組出呼叫 Apps Script 的完整網址，自動帶入房間代碼
        function apiUrl(params) {
            const usp = new URLSearchParams(Object.assign({ room: ROOM_ID }, params));
            return APPS_SCRIPT_URL + '?' + usp.toString();
        }

        // 題庫：注意這裡「刻意不含正確答案」——boolean 題不再有 answer 欄位、
        // choice 題不再有 correctIndex 欄位。正確答案只存在後端 Apps Script 裡，
        // 這樣按 F12 打開 Sources／View Source 也看不到任何一題的正解。
        const QUESTIONS = [
            { id: 'q1', type: 'boolean', text: '戴手套可以取代洗手；只要手套沒有破損，就可以持續戴著照護不同病人或不同照護步驟。', points: 10 },
            { id: 'q2', type: 'boolean', text: '本院洗手種類包含一般性洗手、消毒性洗手與外科刷手；一般性洗手可清除大部分暫時性細菌。', points: 20 },
            { id: 'q3', type: 'boolean', text: 'WHO 提出的「洗手五時機」包括：接觸病人前、執行無菌/清潔操作前、暴觸體液後、接觸病人後、接觸病人週遭環境後。', points: 10 },
            { id: 'q4', type: 'boolean', text: '病人手部有明顯髒污，或照護疑似困難梭狀桿菌（C. diff）感染病人後，只要用酒精性乾洗手液消毒即可，不需要用肥皂及清水洗手。', points: 20 },
            { id: 'q5', type: 'boolean', text: '穿脫個人防護裝備（PPE）時，脫除的原則順序為：手套 → 護目鏡/面罩 → 隔離衣 → 口罩，脫除後應立即洗手。', points: 20 },
            { id: 'q6', type: 'boolean', text: '發生針扎（尖銳物品扎傷）後，正確處置的第一步是立即擠出傷口血液，再以肥皂和大量清水沖洗傷口。', points: 15 },
            { id: 'q7', type: 'boolean', text: '空氣傳染防護（Airborne Precautions）只要配戴外科口罩即可，不需要配戴 N95 等級呼吸防護具。', points: 20 },
            { id: 'q8', type: 'boolean', text: '留置導尿管期間應盡量維持密閉式引流系統，且集尿袋應低於膀胱位置，以防止尿液逆流。', points: 15 },
            { id: 'q9', type: 'boolean', text: '使用後的針具應立即將針頭回套針帽（re-cap），以避免刺傷他人。', points: 20 },
            { id: 'q10', type: 'boolean', text: '置放中心靜脈導管（CVC）時應採最大無菌屏障（無菌長袍、無菌手套、口罩、髮帽及大範圍無菌單）。', points: 15 },
            { id: 'q11', type: 'boolean', text: '外科手術部位感染（SSI）監測期通常為術後30天，若有植入物則依手術類別可延長至90天或1年。', points: 15 },
            { id: 'q12', type: 'boolean', text: '照護不同病人之間，只要沒有明顯髒污，就不需要進行手部衛生。', points: 10 },
            { id: 'mc1', type: 'choice', text: '依照 WHO 洗手五時機，下列何者「不」包括在內？', options: ['接觸病人前', '用餐前', '暴觸體液後', '接觸病人週遭環境後'], points: 20 },
            { id: 'mc2', type: 'choice', text: '使用酒精性乾洗手液時，建議至少搓揉多久才能達到有效殺菌效果？', options: ['5 秒', '10 秒', '20～30 秒', '2 分鐘'], points: 15 },
            { id: 'mc3', type: 'choice', text: '執行「接觸傳染防護」（Contact Precautions）時，最需要加強穿戴的防護裝備是？', options: ['N95 口罩', '手套與隔離衣', '護目鏡', '鉛衣'], points: 15 },
            { id: 'mc4', type: 'choice', text: '發生針扎意外，除了立即處理傷口，接下來「最優先」該做的是？', options: ['自行上網查資料', '立即通報並依院內感染管制流程處理', '先觀察一週再說', '直接請假回家休息'], points: 20 },
            { id: 'mc5', type: 'choice', text: '下列何者「不是」正確的醫療廢棄物分類方式？', options: ['尖銳物品丟入利器盒', '被血液污染的紗布視為感染性事業廢棄物', '將針具與一般垃圾混合丟棄', '生物性廢棄物依規定滅菌後處理'], points: 20 }
        ];

        // 答案索引：Base64 編碼過的正確答案表，避免「檢視原始碼」直接看到 answer:true/false 這種明碼。
        // ⚠️ 這只是「防君子不防小人」的簡單遮蔽，不是真正的安全機制——
        // 有心人在 Console 裡呼叫一次 _decodeAnswerKey() 或下中斷點，一樣能把答案全部撈出來。
        // 真正要防止竄改／偷看，答案驗證跟計分必須搬到後端做（可參考 AppsScript_SecureScoring.gs 的作法）。
        const _AK = "eyJxMSI6ZmFsc2UsInEyIjp0cnVlLCJxMyI6dHJ1ZSwicTQiOmZhbHNlLCJxNSI6dHJ1ZSwicTYiOnRydWUsInE3IjpmYWxzZSwicTgiOnRydWUsInE5IjpmYWxzZSwicTEwIjp0cnVlLCJxMTEiOnRydWUsInExMiI6ZmFsc2UsIm1jMSI6MSwibWMyIjoyLCJtYzMiOjEsIm1jNCI6MSwibWM1IjoyfQ==";
        function _decodeAnswerKey() {
            return JSON.parse(atob(_AK));
        }

        // 前端唯一的狀態物件，畫面完全依據這裡的值來 render()
        let state = {
            screen: 'login',       // 目前畫面：login / game / end
            playerId: '',          // 這名玩家的唯一識別碼（登入時產生）
            name: '',              // 玩家輸入的姓名／職稱
            questions: [],         // 這場作答要出的題目（依 id 順序，複製自 QUESTIONS）
            currentIndex: 0,       // 目前作答到第幾題
            score: 0,              // 目前累積分數（最低 0 分，不會變負數）
            correct: 0,            // 答對題數
            total: 0,              // 已作答題數
            feedback: null,        // （目前未使用，保留欄位）
            locked: false,         // 是否鎖定作答中的按鈕（送出答案到換下一題之間的過渡期）
            leaderboard: {},       // 從後端抓回來的排行榜資料（拿來算排名用）
            stats: {},             // 從後端抓回來的答錯率統計
            registrationOpen: true // 主辦人是否開放讓新玩家加入作答
        };

        let pollTimer = null;       // 輪詢用的計時器 id，換頁或重新排程時要先清掉舊的
        let lastKnownRegOpen = null; // 上一次輪詢時記錄的開放狀態，用來比對是否有變化

        // 統一的後端呼叫入口：帶著 action（list/update/logAnswer/reset/setRegistration...）
        // 打去 Apps Script，並把回傳的排行榜/統計/開放狀態同步進 state。失敗時不會拋錯中斷畫面，只印在 console。
        async function fetchState(action, extraParams) {
            try {
                const res = await fetch(apiUrl(Object.assign({ action: action }, extraParams || {})));
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                state.leaderboard = data.leaderboard || {};
                state.stats = data.stats || {};
                state.registrationOpen = (data.registrationOpen !== false);
                return data;
            } catch (e) {
                console.error('與伺服器溝通失敗:', e.message);
                return null;
            }
        }

        // 把「我」目前的分數/答對數/是否完成，回報給後端，讓其他人查排名時看得到最新資料
        async function updateMyEntry(finished) {
            if (!state.playerId) return;
            await fetchState('update', {
                playerId: sanitizeKey(state.playerId),
                name: state.name,
                score: state.score,
                correct: state.correct,
                total: state.total,
                finished: !!finished
            });
        }

        // 每答一題就順便回報這題的正確率統計（不影響玩家自己的分數）
        function logAnswerStat(questionId, isCorrect) {
            fetchState('logAnswer', { questionId: questionId, correct: !!isCorrect });
        }

        // 輕量輪詢：只用來偵測「開放/關閉作答」的狀態有沒有變化。
        // 若目前在登入畫面、且開放狀態跟上次不一樣，就自動重新渲染登入畫面。
        async function refreshLeaderboard() {
            await fetchState('list');
            if (state.screen === 'login' && state.registrationOpen !== lastKnownRegOpen) {
                lastKnownRegOpen = state.registrationOpen;
                render();
            } else {
                lastKnownRegOpen = state.registrationOpen;
            }
        }

        // 用遞迴 setTimeout（而非固定的 setInterval）排程下一次輪詢，
        // 每次間隔都是 30 秒基礎 + 0~15 秒隨機抖動，避免所有玩家同時打 API。
        function startPolling() {
            if (pollTimer) clearTimeout(pollTimer);
            const delay = 30000 + Math.random() * 15000; // 30 秒基礎 + 0~15 秒隨機抖動
            pollTimer = setTimeout(async () => {
                await refreshLeaderboard();
                startPolling();
            }, delay);
        }

        // 把目前抓到的排行榜資料，依「分數」由高到低排序（分數相同再比答對題數）
        function sortedEntries() {
            return Object.entries(state.leaderboard)
                .sort((a, b) => (b[1].score - a[1].score) || (b[1].correct - a[1].correct));
        }

        // 簡易的 HTML escape，避免玩家輸入的姓名裡有特殊字元破壞畫面結構
        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        // 依照 state.screen 畫出對應畫面（login / game / end），每次呼叫都會整個重畫 #app
        function render() {
            const app = document.getElementById('app');
            // ---- 登入畫面：輸入姓名並加入作答，若主辦人關閉報名則顯示提示 ----
            if (state.screen === 'login') {
                app.innerHTML = `
                            <div class="row g-3">
                              <div class="col-lg-8 mx-auto">
                                <div class="card">
                                  <span class="ribbon-corner">🎀</span>
                                  <p class="eyebrow">🎮 開始作答</p>
                                  <h2>輸入你的姓名與職稱 加入擂台</h2>
                                  ${state.registrationOpen ? `
                                    <label for="nameInput">姓名 職稱</label>
                                    <input id="nameInput" type="text" placeholder="例如：王小明護理師" maxlength="20">
                                    <button class="btn btn-primary btn-block" id="joinBtn">🚀 加入作答</button>
                                  ` : `
                                    <div class="closed-msg">🚫 目前尚未開放加入作答，請稍候主辦人開放後再試一次</div>
                                  `}
                                </div>
                              </div>
                            </div>
                        `;
                if (state.registrationOpen) {
                    document.getElementById('joinBtn').onclick = onJoin;
                    document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') onJoin(); });
                }
            }
            // ---- 答題畫面：顯示目前分數、題目與答案按鈕（是非題或選擇題） ----
            else if (state.screen === 'game') {
                const q = state.questions[state.currentIndex];
                const pct = Math.round((state.currentIndex / state.questions.length) * 100);
                const answersHtml = q.type === 'choice'
                    ? `<div class="choice-list">${q.options.map((opt, idx) => `
                                <button class="choice-btn" id="choiceBtn${idx}" ${state.locked ? 'disabled' : ''}><span class="choice-letter">${String.fromCharCode(65 + idx)}</span>${escapeHtml(opt)}</button>
                              `).join('')}</div>`
                    : `<div class="answers">
                                <button class="ans-btn true" id="btnTrue" ${state.locked ? 'disabled' : ''}>⭕ 是 / 正確</button>
                                <button class="ans-btn false" id="btnFalse" ${state.locked ? 'disabled' : ''}>❌ 否 / 錯誤</button>
                              </div>`;
                app.innerHTML = `
                            <div class="row g-3">
                              <div class="col-lg-8 mx-auto">
                                <div class="card">
                                  <span class="ribbon-corner">🎀</span>
                                  <div class="dial-zone">
                                    <div class="dial" id="dial">
                                      <div class="dial-inner">
                                        <div class="dial-score" id="scoreNum">${state.score}</div>
                                        <div class="dial-label">目前分數</div>
                                      </div>
                                    </div>
                                  </div>
                                  <div class="progress-wrap">
                                    第 ${state.currentIndex + 1} / ${state.questions.length} 題　<span class="name-chip">👤 ${escapeHtml(state.name)}</span>
                                    <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
                                  </div>
                                  <div class="qcard">
                                    <div class="qpoints">本題配分：${q.points} 分　${q.type === 'choice' ? '· 選擇題' : '· 是非題'}</div>
                                    <div class="qtext">${escapeHtml(q.text)}</div>
                                  </div>
                                  ${answersHtml}
                                  <div class="feedback" id="feedbackZone">${state.locked ? '📮 已送出，前往下一題…' : ''}</div>
                                </div>
                              </div>
                            </div>
                        `;
                if (q.type === 'choice') {
                    q.options.forEach((opt, idx) => {
                        document.getElementById('choiceBtn' + idx).onclick = () => answer(idx);
                    });
                } else {
                    document.getElementById('btnTrue').onclick = () => answer(true);
                    document.getElementById('btnFalse').onclick = () => answer(false);
                }
            }
            // ---- 結算畫面：顯示總分、答對題數與目前排名，並施放彩帶特效 ----
            else if (state.screen === 'end') {
                const entries = sortedEntries();
                const myRank = entries.findIndex(([id]) => id === state.playerId) + 1;
                app.innerHTML = `
                            <div class="row g-3">
                              <div class="col-lg-8 mx-auto">
                                <div class="card">
                                  <span class="ribbon-corner">🎀</span>
                                  <span class="trophy">👑</span>
                                  <p class="eyebrow text-center">作答完成</p>
                                  <h2 class="text-center">${escapeHtml(state.name)}，你的結果出爐了！</h2>
                                  <p class="sub text-center">${myRank > 0 ? `目前排名第 ${myRank} 名` : ''}</p>
                                  <div class="end-stats">
                                    <div class="stat"><div class="num">${state.score}</div><div class="lbl">總分</div></div>
                                    <div class="stat"><div class="num">${state.correct}/${state.total}</div><div class="lbl">答對題數</div></div>
                                    <div class="stat"><div class="num">${myRank > 0 ? ('#' + myRank) : '-'}</div><div class="lbl">目前排名</div></div>
                                  </div>
                                  <p class="sub text-center" style="margin:0;">🎉 感謝作答，本次題組已全部完成！</p>
                                </div>
                              </div>
                            </div>
                        `;
                launchConfetti();
            }
        }

        // 點擊「加入作答」時觸發：驗證姓名、初始化這場作答的狀態，並切換到答題畫面
        function onJoin() {
            const input = document.getElementById('nameInput');
            const name = (input.value || '').trim();
            if (!name) {
                input.focus();
                input.style.borderColor = 'var(--coral)'; // 沒填姓名就標紅提示
                return;
            }
            state.name = name;
            state.playerId = sanitizeKey(name) + '_' + Math.random().toString(36).slice(2, 6); // 姓名+隨機字串，避免撞名
            state.questions = QUESTIONS.slice(); // 依 id 順序出題，不隨機
            state.currentIndex = 0;
            state.score = 0;
            state.correct = 0;
            state.total = 0;
            state.feedback = null;
            state.locked = false;
            state.screen = 'game';
            updateMyEntry(false); // 先跟後端登記一筆分數 0 的紀錄，讓排行榜馬上看得到這個人
            render();
        }

        // 玩家送出答案時觸發。selected 是非題傳 true/false，選擇題傳選項索引。
        // 對錯判斷回到前端自己算（answerKey 是從 Base64 解碼出來的正確答案表）。
        // ⚠️ 這代表分數是前端自己算好才回報給後端，後端沒有再驗證一次——
        // 也就是說「F12 竄改分數」的風險在這個簡化版裡是存在的，這是特意選擇的取捨。
        function answer(selected) {
            if (state.locked) return; // 防止同一題重複送出
            state.locked = true;
            const q = state.questions[state.currentIndex];
            const answerKey = _decodeAnswerKey();
            const correctVal = answerKey[q.id];
            const isCorrect = selected === correctVal;
            const delta = isCorrect ? q.points : -0; // 答對加分，答錯不扣分（目前設定）
            state.score = Math.max(0, state.score + delta); // 分數不會低於 0
            state.total += 1;
            if (isCorrect) state.correct += 1;

            const scoreNum = document.getElementById('scoreNum');
            if (scoreNum) scoreNum.textContent = state.score; // 直接更新分數圓盤，不用整頁重畫

            // 鎖住這一題的所有按鈕，避免使用者連點
            if (q.type === 'choice') {
                q.options.forEach((opt, idx) => {
                    const btn = document.getElementById('choiceBtn' + idx);
                    if (!btn) return;
                    btn.disabled = true;
                    if (idx === selected) btn.classList.add('selected'); // 只標示「你選了哪個」，不標示對錯
                });
            } else {
                document.getElementById('btnTrue').disabled = true;
                document.getElementById('btnFalse').disabled = true;
            }
            const fz = document.getElementById('feedbackZone');
            if (fz) fz.textContent = '📮 已送出，前往下一題…'; // 中性提示，不透露對錯

            logAnswerStat(q.id, isCorrect); // 回報這題的答對/答錯率統計

            const isLast = (state.currentIndex + 1) >= state.questions.length;
            updateMyEntry(isLast); // 同步最新分數給後端；如果是最後一題就順便標記完成

            // 停頓 0.5 秒讓玩家看到「已送出」的回饋，再切換到下一題或結算畫面
            setTimeout(() => {
                state.currentIndex += 1;
                state.locked = false;
                if (state.currentIndex >= state.questions.length) {
                    state.screen = 'end';
                }
                render();
            }, 500);
        }

        // 【主辦人用】清空所有玩家的排行榜與統計資料，會先跳出確認視窗
        async function onResetBoard() {
            if (!confirm('確定要清空所有玩家的排行榜與答錯率統計資料嗎？此動作無法復原。')) return;
            await fetchState('reset');
            render();
        }

        // 【主辦人用】切換「是否開放新玩家加入作答」
        async function onToggleRegistration() {
            const newOpen = !state.registrationOpen;
            await fetchState('setRegistration', { open: newOpen });
            render();
        }

        /* ---------------------------------------------------------------
           ✨ 蘿莉風視覺特效：飄浮裝飾 / 點擊亮片 / 結算彩帶
           （純視覺效果，不影響任何題目邏輯與正確答案顯示）
           --------------------------------------------------------------- */
        const FLOATY_EMOJI = ['💗', '⭐', '🎀', '✨', '🫧', '🌸'];

        // 在背景產生一批會往上飄的裝飾 emoji（愛心/星星/緞帶等），純視覺、不影響互動
        function initFloatingBG() {
            const layer = document.getElementById('floatyLayer');
            if (!layer) return;
            const count = window.innerWidth < 600 ? 12 : 20; // 手機少放一點，避免太擁擠
            for (let i = 0; i < count; i++) {
                const span = document.createElement('span');
                span.className = 'floaty';
                span.textContent = FLOATY_EMOJI[Math.floor(Math.random() * FLOATY_EMOJI.length)];
                span.style.left = Math.random() * 100 + 'vw';
                span.style.fontSize = (0.9 + Math.random() * 1.3) + 'rem';
                const duration = 9 + Math.random() * 10;
                span.style.animationDuration = duration + 's';
                span.style.animationDelay = (Math.random() * duration) + 's'; // 隨機延遲讓每個一開始就錯開
                layer.appendChild(span);
            }
        }

        const SPARKLE_EMOJI = ['✨', '💖', '⭐', '🌟'];
        // 在指定座標生成一個亮片 emoji，短暫飄一下就自動消失
        function spawnSparkle(x, y) {
            const el = document.createElement('div');
            el.className = 'tap-sparkle';
            el.textContent = SPARKLE_EMOJI[Math.floor(Math.random() * SPARKLE_EMOJI.length)];
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 720); // 動畫播完就從 DOM 移除，避免累積
        }

        // 只要點到按鈕類元素（一般按鈕/選擇題/是非題/分頁按鈕），就在點擊處噴一個亮片
        document.addEventListener('click', (e) => {
            const target = e.target.closest('.btn, .choice-btn, .ans-btn, .lb-page-btn');
            if (!target) return;
            spawnSparkle(e.clientX, e.clientY);
        });

        const CONFETTI_COLORS = ['#FF7EB6', '#C9A6FF', '#9BE8CC', '#FFD966', '#7FE0E8', '#FF8FA3'];
        // 結算畫面用的彩帶特效：噴出 60 片會飄落旋轉的彩色紙片
        function launchConfetti() {
            const n = 60;
            for (let i = 0; i < n; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                const size = 6 + Math.random() * 8;
                piece.style.left = Math.random() * 100 + 'vw';
                piece.style.width = size + 'px';
                piece.style.height = (size * 0.4) + 'px';
                piece.style.background = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
                piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px'; // 隨機圓形或方形紙片
                const duration = 2.4 + Math.random() * 1.8;
                piece.style.animationDuration = duration + 's';
                piece.style.animationDelay = (Math.random() * 0.6) + 's';
                document.body.appendChild(piece);
                setTimeout(() => piece.remove(), (duration + 1) * 1000); // 落地後清掉，避免 DOM 越堆越多
            }
        }

        // 頁面載入後的初始化流程：
        // 1) 先鋪好飄浮背景特效
        // 2) 跟後端要一次目前的排行榜/開放狀態（結算排名跟登入畫面都會用到）
        // 3) 畫出第一個畫面（登入畫面）
        // 4) 啟動輕量輪詢，持續偵測開放狀態是否改變
        (async function init() {
            initFloatingBG();
            await fetchState('list');
            lastKnownRegOpen = state.registrationOpen;
            render();
            startPolling();
        })();
    </script>
</body>
</html>
