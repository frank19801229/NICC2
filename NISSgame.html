<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>感控問答擂台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

        :root {
            --pink: #FF6FA5;
            --pink-dark: #E0447F;
            --orange: #FFA65C;
            --purple: #8B6FE8;
            --purple-dark: #5B3FA8;
            --cyan: #7FE0EA;
            --yellow: #FFD782;
            --green: #2ECC71;
            --coral: #FF5C5C;
            --ink: #2A1B3D;
            --slate: #8B7BA8;
            --card: #FFFFFF;
            --line: #F0E6FF;
            /* ---- 新海誠風格 天空 / 光影 專用色票 ---- */
            --sky-zenith: #2B2A6B;
            --sky-upper: #6C4E9E;
            --sky-mid: #C4699A;
            --sky-low: #FFA97A;
            --sky-horizon: #FFE1A8;
            --sun-core: #FFF6D8;
            --sun-glow: #FFCB7A;
            --cloud-lit: rgba(255,236,214,0.9);
            --cloud-shadow: rgba(120,90,160,0.35);
            --cyan-dark: #1E8FA6;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Noto Sans TC', sans-serif;
            color: var(--ink);
            background:
                radial-gradient(ellipse 60% 40% at 78% 22%, var(--sun-core) 0%, var(--sun-glow) 18%, rgba(255,203,122,0) 60%),
                linear-gradient(180deg, var(--sky-zenith) 0%, var(--sky-upper) 32%, var(--sky-mid) 58%, var(--sky-low) 78%, var(--sky-horizon) 100%);
            background-attachment: fixed;
            position: relative;
            overflow-x: hidden;
        }

        /* ================= 新海誠風格：天空舞台 ================= */
        #skyStage {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        /* 耶穌光 / 耀眼光束 */
        .godrays {
            position: absolute;
            top: -20%;
            right: -25%;
            width: 140%;
            height: 140%;
            background: conic-gradient(from 200deg at 78% 22%,
                rgba(255,246,216,0) 0deg,
                rgba(255,246,216,0.55) 4deg,
                rgba(255,246,216,0) 9deg,
                rgba(255,246,216,0) 18deg,
                rgba(255,246,216,0.4) 23deg,
                rgba(255,246,216,0) 29deg,
                rgba(255,246,216,0) 40deg,
                rgba(255,246,216,0.5) 46deg,
                rgba(255,246,216,0) 53deg,
                rgba(255,246,216,0) 70deg,
                rgba(255,246,216,0.35) 76deg,
                rgba(255,246,216,0) 84deg,
                rgba(255,246,216,0) 360deg);
            mix-blend-mode: screen;
            animation: rayRotate 40s linear infinite;
            opacity: .85;
            will-change: transform;
        }
        @keyframes rayRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 太陽核心暈光，隨呼吸微微脈動 */
        .sunGlow {
            position: absolute;
            top: 10%;
            right: 12%;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--sun-core) 0%, var(--sun-glow) 35%, rgba(255,203,122,0) 72%);
            filter: blur(2px);
            animation: sunBreathe 5s ease-in-out infinite;
            box-shadow: 0 0 120px 60px rgba(255,203,122,0.35);
        }
        @keyframes sunBreathe {
            0%,100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.08); opacity: .88; }
        }

        /* 遠山剪影 */
        .mountains {
            position: absolute;
            left: 0; right: 0; bottom: 0;
            height: 22vh;
            background:
                linear-gradient(180deg, rgba(80,58,110,0) 0%, rgba(58,38,86,0.9) 100%);
            clip-path: polygon(0% 60%, 8% 40%, 18% 55%, 30% 30%, 42% 50%, 55% 25%, 68% 48%, 80% 32%, 92% 52%, 100% 38%, 100% 100%, 0% 100%);
            opacity: .8;
        }

        /* 雲層（多層視差飄動） */
        .cloud-layer { position: absolute; left: -20%; width: 140%; pointer-events: none; }
        .cloud {
            position: absolute;
            border-radius: 50%;
            filter: blur(1px);
        }
        .cloud-layer.back { top: 12%; animation: driftSlow 90s linear infinite; opacity: .55; }
        .cloud-layer.mid { top: 26%; animation: driftMed 60s linear infinite; opacity: .75; }
        .cloud-layer.front { top: 42%; animation: driftFast 38s linear infinite; opacity: .9; }
        @keyframes driftSlow { 0% { transform: translateX(0); } 100% { transform: translateX(35%); } }
        @keyframes driftMed { 0% { transform: translateX(0); } 100% { transform: translateX(-30%); } }
        @keyframes driftFast { 0% { transform: translateX(0); } 100% { transform: translateX(25%); } }

        /* 光塵 / 螢光粒子（隨滑鼠做微視差） */
        #dustLayer { position: absolute; inset: 0; }
        .dust {
            position: absolute;
            width: 3px; height: 3px;
            border-radius: 50%;
            background: var(--cloud-lit);
            box-shadow: 0 0 6px 2px rgba(255,236,214,0.8);
            animation: dustFloat linear infinite, dustTwinkle 3s ease-in-out infinite;
        }
        @keyframes dustFloat {
            0% { transform: translateY(0); }
            100% { transform: translateY(-120vh); }
        }
        @keyframes dustTwinkle {
            0%,100% { opacity: .15; }
            50% { opacity: .95; }
        }

        /* 流星（偶發） */
        .shootingStar {
            position: absolute;
            width: 2px; height: 2px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 8px 2px rgba(255,255,255,0.9);
            animation: shoot 1.1s linear forwards;
        }
        .shootingStar::before {
            content: '';
            position: absolute;
            top: 50%; right: 0;
            width: 120px; height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,0.9), transparent);
            transform: translateY(-50%);
        }
        @keyframes shoot {
            0% { transform: translate(0,0); opacity: 1; }
            100% { transform: translate(-360px, 220px); opacity: 0; }
        }

        /* 游標暈光（互動光暈，跟隨滑鼠） */
        #cursorGlow {
            position: fixed;
            top: 0; left: 0;
            width: 260px; height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,246,216,0.28) 0%, rgba(255,246,216,0) 70%);
            transform: translate(-50%,-50%);
            pointer-events: none;
            z-index: 1;
            mix-blend-mode: screen;
            transition: opacity .3s ease;
            opacity: 0;
        }

        /* 內容需高於天空圖層 */
        .wrap { position: relative; z-index: 2; }

        /* 卡片：柔光玻璃質感 */
        .card {
            background: linear-gradient(180deg, rgba(255,255,255,0.86), rgba(255,250,255,0.78));
            -webkit-backdrop-filter: blur(18px) saturate(1.1);
            backdrop-filter: blur(18px) saturate(1.1);
            position: relative;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow:
                0 20px 55px -18px rgba(60,30,90,0.55),
                0 0 0 1px rgba(255,255,255,0.35) inset,
                0 -2px 24px rgba(255,203,122,0.25) inset;
            overflow: hidden;
        }
        .card::after {
            content: '';
            position: absolute;
            top: 0; left: -60%;
            width: 40%; height: 100%;
            background: linear-gradient(100deg, transparent, rgba(255,255,255,0.55), transparent);
            animation: cardShine 7s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes cardShine {
            0%, 60% { left: -60%; }
            100% { left: 130%; }
        }

        /* 按鈕水波紋（互動回饋） */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.55);
            transform: scale(0);
            animation: rippleAnim .6s ease-out forwards;
            pointer-events: none;
        }
        @keyframes rippleAnim {
            to { transform: scale(2.6); opacity: 0; }
        }
        .btn, .ans-btn, .choice-btn { position: relative; overflow: hidden; }

        .wrap {
            max-width: 1120px;
            margin: 0 auto;
            padding: 22px 16px 60px;
        }

        /* ---------- 頂部品牌列 ---------- */
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 22px;
            justify-content: center;
        }

            .brand .mascot {
                font-size: 2.1rem;
                filter: drop-shadow(0 4px 10px rgba(0,0,0,0.35));
                animation: bounce 2.4s ease-in-out infinite;
            }

        @keyframes bounce {
            0%,100% {
                transform: translateY(0) rotate(-4deg);
            }

            50% {
                transform: translateY(-6px) rotate(4deg);
            }
        }

        .brand h1 {
            font-family: 'Baloo 2', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 0.02em;
            margin: 0;
            color: #fff;
            text-shadow: 0 3px 0 rgba(0,0,0,0.25), 0 0 22px rgba(255,214,150,0.7);
        }

        .brand .badge-live {
            font-family: 'Baloo 2', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--yellow), var(--orange));
            color: #4a2600;
            padding: 4px 12px;
            border-radius: 999px;
            box-shadow: 0 4px 10px rgba(255,140,66,0.5);
        }

        /* ---------- 卡片 ---------- */
        .card {
            background: var(--card);
            border: none;
            border-radius: 28px;
            padding: 28px;
            box-shadow: 0 20px 45px -18px rgba(59,10,99,0.55);
            position: relative;
            overflow: hidden;
        }

            .card::before {
                content: '';
                position: absolute;
                top: -40px;
                right: -40px;
                width: 140px;
                height: 140px;
                border-radius: 50%;
                background: radial-gradient(circle, rgba(255,61,129,0.18), transparent 70%);
            }

        .eyebrow {
            font-family: 'Baloo 2', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--pink-dark);
            margin: 0 0 6px;
        }

        h2 {
            font-family: 'Baloo 2', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            margin: 0 0 8px;
            color: var(--ink);
        }

        p.sub {
            color: var(--purple-dark);
            margin: 0 0 22px;
            line-height: 1.7;
            font-size: 1.3rem;
            font-weight: 800;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--slate);
            font-weight: 600;
            margin-bottom: 6px;
        }

        input[type=text] {
            width: 100%;
            padding: 15px 18px;
            border-radius: 16px;
            border: 2.5px solid var(--line);
            font-size: 1.5rem;
            font-family: inherit;
            background: #FBFAFF;
            color: var(--ink);
            transition: border-color .15s ease, box-shadow .15s ease;
        }

            input[type=text]:focus {
                outline: none;
                border-color: var(--pink);
                box-shadow: 0 0 0 4px rgba(255,61,129,0.18);
                background: #fff;
            }

        /* ---------- 按鈕 ---------- */
        .btn {
            appearance: none;
            border: none;
            cursor: pointer;
            font-family: 'Baloo 2', sans-serif;
            font-weight: 700;
            font-size: 1.05rem;
            border-radius: 16px;
            padding: 15px 22px;
            transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
        }

            .btn:active {
                transform: scale(0.96);
            }

        .btn-primary {
            background: linear-gradient(135deg, var(--pink), var(--purple));
            color: #fff;
            box-shadow: 0 10px 24px -8px rgba(255,61,129,0.65);
        }

            .btn-primary:hover {
                filter: brightness(1.08);
            }

        .btn-block {
            width: 100%;
            margin-top: 18px;
            font-size: 1.5rem;
        }

        .btn-ghost {
            background: transparent;
            color: var(--slate);
            border: 2px solid var(--line);
            font-weight: 600;
            font-size: 0.9rem;
        }

            .btn-ghost:hover {
                border-color: var(--pink);
                color: var(--pink);
            }

        .foot-link {
            margin-top: 18px;
            text-align: center;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px 16px;
        }

            .foot-link button {
                background: none;
                border: none;
                color: var(--slate);
                font-size: 0.75rem;
                text-decoration: underline;
                cursor: pointer;
                font-family: inherit;
            }

        /* ---------- 分數圓盤 ---------- */
        .dial-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px;
        }

        .dial {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            border-radius: 50%;
            background: conic-gradient(var(--cyan) 0deg, var(--pink) 180deg, var(--yellow) 360deg);
            padding: 7px;
            box-shadow: 0 12px 28px -10px rgba(124,58,237,0.55);
        }

            .dial::after {
                content: '';
                position: absolute;
                inset: 7px;
                border-radius: 50%;
                background: #fff;
            }

        .dial-inner {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .dial.flash-correct {
            animation: pulseGood .7s ease-out;
        }

        .dial.flash-wrong {
            animation: pulseBad .7s ease-out;
        }

        @keyframes pulseGood {
            0% {
                box-shadow: 0 0 0 0 rgba(46,204,113,0.55);
            }

            100% {
                box-shadow: 0 0 0 30px rgba(46,204,113,0);
            }
        }

        @keyframes pulseBad {
            0% {
                box-shadow: 0 0 0 0 rgba(255,92,92,0.55);
            }

            100% {
                box-shadow: 0 0 0 30px rgba(255,92,92,0);
            }
        }

        .dial-score {
            font-family: 'Baloo 2', sans-serif;
            font-size: 2.7rem;
            font-weight: 800;
            color: var(--ink);
        }

        .dial-label {
            font-size: 1.3rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--purple-dark);
            font-weight: 600;
        }

        .flash-correct .dial-score {
            color: var(--green);
        }

        .flash-wrong .dial-score {
            color: var(--coral);
        }

        .progress-wrap {
            font-family: 'Baloo 2', sans-serif;
            font-size: 1.2rem;
            color: var(--ink);
            text-align: center;
            margin-bottom: 18px;
            font-weight: 600;
        }

            .progress-wrap .name-chip {
                display: inline-block;
                background: var(--line);
                color: var(--purple-dark);
                padding: 3px 12px;
                border-radius: 999px;
                margin-left: 4px;
            }

        .progress-bar-track {
            height: 12px;
            border-radius: 999px;
            background: var(--line);
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--yellow), var(--orange));
            transition: width .35s ease;
            border-radius: 999px;
        }

        /* ---------- 題目卡 ---------- */
        .qcard {
            background: linear-gradient(180deg, #FBFAFF, #F3EEFF);
            border: 2px solid var(--line);
            border-radius: 22px;
            padding: 26px;
            margin-bottom: 22px;
        }

        .qpoints {
            display: inline-block;
            font-family: 'Baloo 2', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: #fff;
            background: linear-gradient(135deg, var(--purple), var(--pink));
            border-radius: 999px;
            padding: 5px 16px;
            margin-bottom: 16px;
            box-shadow: 0 6px 14px -4px rgba(124,58,237,0.5);
        }

        .qtext {
            font-size: 1.7rem;
            line-height: 1.75;
            font-weight: 600;
            color: var(--ink);
        }

        .answers {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .ans-btn {
            padding: 22px 10px;
            border-radius: 18px;
            border: none;
            font-family: 'Baloo 2', sans-serif;
            font-weight: 800;
            font-size: 1.9rem;
            cursor: pointer;
            color: #fff;
            transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
        }

            .ans-btn.true {
                background: linear-gradient(135deg, #34E89E, var(--green));
                box-shadow: 0 10px 22px -8px rgba(46,204,113,0.6);
            }

            .ans-btn.false {
                background: linear-gradient(135deg, #FF7A7A, var(--coral));
                box-shadow: 0 10px 22px -8px rgba(255,92,92,0.6);
            }

            .ans-btn:hover {
                filter: brightness(1.06);
            }

            .ans-btn:active {
                transform: scale(0.95);
            }

            .ans-btn:disabled {
                opacity: 0.45;
                cursor: not-allowed;
                transform: none;
            }

        .feedback {
            text-align: center;
            font-family: 'Baloo 2', sans-serif;
            font-size: 1rem;
            min-height: 24px;
            margin-top: 16px;
            font-weight: 700;
        }

            .feedback.ok {
                color: var(--green);
            }

            .feedback.no {
                color: var(--coral);
            }

        /* ---------- 排行榜 ---------- */
        .board-head {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .live-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 0 3px rgba(46,204,113,0.25);
            animation: blink 1.6s infinite;
        }

        @keyframes blink {
            0%,100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .board-title {
            font-family: 'Baloo 2', sans-serif;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--ink);
        }

        .board-sub {
            font-size: 1rem;
            color: var(--slate);
            margin: 0 0 16px 17px;
        }

        .board-total-label {
            text-align: right;
            font-family: 'Baloo 2', sans-serif;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--purple-dark);
            margin: -12px 4px 2px 0;
        }

        .lb-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 10px;
            border-radius: 14px;
            margin-bottom: 7px;
            background: #FBFAFF;
            border: 1.5px solid var(--line);
        }

            .lb-row.me {
                background: linear-gradient(135deg, rgba(255,61,129,0.10), rgba(124,58,237,0.10));
                border: 1.5px solid var(--pink);
            }

        .lb-rank {
            font-family: 'Baloo 2', sans-serif;
            font-weight: 800;
            color: var(--slate);
            font-size: 1.2rem;
            width: 26px;
            flex-shrink: 0;
            text-align: center;
        }

        .lb-name {
            flex: 1;
            font-size: 1.2rem;
            font-weight: 700;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--ink);
        }

        .lb-correct {
            font-family: 'Baloo 2', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--cyan-dark);
            background: rgba(46,204,113,0.15);
            padding: 3px 9px;
            border-radius: 20px;
            flex-shrink: 0;
        }

        .lb-score {
            font-family: 'Baloo 2', sans-serif;
            font-size: 1.2rem;
            font-weight: 800;
            width: 46px;
            text-align: right;
            flex-shrink: 0;
            color: var(--purple);
        }

        .lb-empty {
            color: var(--slate);
            font-size: 1.2rem;
            text-align: center;
            padding: 20px 0;
        }

        /* ---------- 排行榜分頁 ---------- */
        .lb-pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .lb-page-btn {
            min-width: 30px;
            height: 30px;
            padding: 0 8px;
            border-radius: 999px;
            border: 1.5px solid var(--line);
            background: #FBFAFF;
            color: var(--slate);
            font-family: 'Baloo 2', sans-serif;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            transition: background .12s ease, color .12s ease, border-color .12s ease;
        }

            .lb-page-btn:hover:not(:disabled) {
                border-color: var(--pink);
                color: var(--pink);
            }

            .lb-page-btn.active {
                background: linear-gradient(135deg, var(--pink), var(--purple));
                border-color: transparent;
                color: #fff;
            }

            .lb-page-btn:disabled {
                opacity: 0.4;
                cursor: not-allowed;
            }

        .lb-page-info {
            width: 100%;
            text-align: center;
            font-size: 0.72rem;
            color: var(--slate);
            margin-top: 2px;
        }

        /* ---------- 結算畫面 ---------- */
        .end-stats {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 12px;
            margin: 22px 0;
        }

        .stat {
            background: linear-gradient(180deg,#FBFAFF,#F3EEFF);
            border: 2px solid var(--line);
            border-radius: 16px;
            padding: 18px 8px;
            text-align: center;
        }

            .stat .num {
                font-family: 'Baloo 2', sans-serif;
                font-size: 1.6rem;
                font-weight: 800;
                color: var(--purple);
            }

            .stat .lbl {
                font-size: 0.72rem;
                color: var(--slate);
                margin-top: 4px;
                font-weight: 600;
            }

        .trophy {
            font-size: 4rem;
            text-align: center;
            display: block;
            margin-bottom: 6px;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.25));
        }

        .closed-msg {
            background: #FFF4E5;
            border: 2px dashed var(--orange);
            border-radius: 16px;
            padding: 18px;
            text-align: center;
            font-weight: 700;
            color: #9A5B00;
            margin-bottom: 6px;
            font-family: 'Baloo 2', sans-serif;
        }

        /* ---------- 選擇題按鈕 ---------- */
        .choice-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .choice-btn {
            display: flex;
            align-items: center;
            text-align: left;
            width: 100%;
            padding: 15px 18px;
            border-radius: 16px;
            border: 2.5px solid var(--line);
            background: #FBFAFF;
            font-family: 'Noto Sans TC', sans-serif;
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--ink);
            cursor: pointer;
            transition: all .12s ease;
        }

            .choice-btn:hover:not(:disabled) {
                border-color: var(--purple);
                background: #F3EEFF;
                transform: translateY(-2px);
            }

            .choice-btn:disabled {
                cursor: not-allowed;
            }

            .choice-btn.correct {
                background: linear-gradient(135deg, #34E89E, var(--green));
                border-color: var(--green);
                color: #fff;
            }

            .choice-btn.wrong-selected {
                background: linear-gradient(135deg, #FF7A7A, var(--coral));
                border-color: var(--coral);
                color: #fff;
            }

            .choice-btn.selected {
                background: #F3EEFF;
                border-color: var(--purple);
                color: var(--ink);
            }

        .choice-letter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--purple);
            color: #fff;
            font-family: 'Baloo 2', sans-serif;
            font-weight: 800;
            font-size: 0.78rem;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .choice-btn.correct .choice-letter,
        .choice-btn.wrong-selected .choice-letter {
            background: rgba(255,255,255,0.35);
        }

        /* ---------- 答錯率長條圖 ---------- */
        .stat-bar-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 11px;
        }

        .stat-bar-label {
            width: 108px;
            flex-shrink: 0;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--ink);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: help;
        }

        .stat-bar-track {
            flex: 1;
            height: 14px;
            border-radius: 999px;
            background: var(--line);
            overflow: hidden;
        }

        .stat-bar-fill {
            height: 100%;
            border-radius: 999px;
            transition: width .4s ease;
        }

        .stat-bar-pct {
            width: 40px;
            text-align: right;
            font-family: 'Baloo 2', sans-serif;
            font-weight: 800;
            font-size: 0.78rem;
            flex-shrink: 0;
        }

        @media(max-width:575px) {
            .answers {
                gap: 10px;
            }

            .ans-btn {
                font-size: 1.5rem;
                padding: 18px 6px;
            }

            h2 {
                font-size: 1.35rem;
            }
        }
    </style>
</head>
<body>
    <div id="skyStage">
        <div class="godrays"></div>
        <div class="sunGlow"></div>
        <div class="cloud-layer back" id="cloudBack"></div>
        <div class="cloud-layer mid" id="cloudMid"></div>
        <div class="cloud-layer front" id="cloudFront"></div>
        <div class="mountains"></div>
        <div id="dustLayer"></div>
    </div>
    <div id="cursorGlow"></div>
    <div class="wrap">
        <div class="brand">
            <span class="mascot">🧼</span>
            <h1>感控問答擂台</h1>
            <span class="badge-live">即時挑戰</span>
        </div>
        <div id="app"></div>
    </div>
    <script>
        /* =====================================================================
           Google Apps Script 設定 — 請依照 README.md 的步驟部署好 Apps Script
           後，把下面的網址換成你自己的 Web App 網址（結尾是 /exec）。
           ===================================================================== */
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzEJaUPK5WnOauCcXmz0yYlV3alPNa447UC04tNAdwAaJKotixd3Sc6yXCn8jq5Me8ljw/exec";

        /* 房間代碼：同一份 HTML 部署給不同場次/單位使用時，改這個字串即可
           讓彼此的排行榜互相獨立，不會混在一起。 */
        const ROOM_ID = "default-room";

        function sanitizeKey(s) {
            return String(s).replace(/[^a-zA-Z0-9_\u4e00-\u9fff-]/g, '_');
        }

        function apiUrl(params) {
            const usp = new URLSearchParams(Object.assign({ room: ROOM_ID }, params));
            return APPS_SCRIPT_URL + '?' + usp.toString();
        }

        const QUESTIONS = [
            { id: 'q1', type: 'boolean', text: '戴手套可以取代洗手；只要手套沒有破損，就可以持續戴著照護不同病人或不同照護步驟。', answer: false, points: 10 },
            { id: 'q2', type: 'boolean', text: '本院洗手種類包含一般性洗手、消毒性洗手與外科刷手；一般性洗手可清除大部分暫時性細菌。', answer: true, points: 20 },
            { id: 'q3', type: 'boolean', text: 'WHO 提出的「洗手五時機」包括：接觸病人前、執行無菌/清潔操作前、暴觸體液後、接觸病人後、接觸病人週遭環境後。', answer: true, points: 10 },
            { id: 'q4', type: 'boolean', text: '病人手部有明顯髒污，或照護疑似困難梭狀桿菌（C. diff）感染病人後，只要用酒精性乾洗手液消毒即可，不需要用肥皂及清水洗手。', answer: false, points: 20 },
            { id: 'q5', type: 'boolean', text: '穿脫個人防護裝備（PPE）時，脫除的原則順序為：手套 → 護目鏡/面罩 → 隔離衣 → 口罩，脫除後應立即洗手。', answer: true, points: 20 },
            { id: 'q6', type: 'boolean', text: '發生針扎（尖銳物品扎傷）後，正確處置的第一步是立即擠出傷口血液，再以肥皂和大量清水沖洗傷口。', answer: true, points: 15 },
            { id: 'q7', type: 'boolean', text: '空氣傳染防護（Airborne Precautions）只要配戴外科口罩即可，不需要配戴 N95 等級呼吸防護具。', answer: false, points: 20 },
            { id: 'q8', type: 'boolean', text: '留置導尿管期間應盡量維持密閉式引流系統，且集尿袋應低於膀胱位置，以防止尿液逆流。', answer: true, points: 15 },
            { id: 'q9', type: 'boolean', text: '使用後的針具應立即將針頭回套針帽（re-cap），以避免刺傷他人。', answer: false, points: 20 },
            { id: 'q10', type: 'boolean', text: '置放中心靜脈導管（CVC）時應採最大無菌屏障（無菌長袍、無菌手套、口罩、髮帽及大範圍無菌單）。', answer: true, points: 15 },
            { id: 'q11', type: 'boolean', text: '外科手術部位感染（SSI）監測期通常為術後30天，若有植入物則依手術類別可延長至90天或1年。', answer: true, points: 15 },
            { id: 'q12', type: 'boolean', text: '照護不同病人之間，只要沒有明顯髒污，就不需要進行手部衛生。', answer: false, points: 10 },
            { id: 'mc1', type: 'choice', text: '依照 WHO 洗手五時機，下列何者「不」包括在內？', options: ['接觸病人前', '用餐前', '暴觸體液後', '接觸病人週遭環境後'], correctIndex: 1, points: 20 },
            { id: 'mc2', type: 'choice', text: '使用酒精性乾洗手液時，建議至少搓揉多久才能達到有效殺菌效果？', options: ['5 秒', '10 秒', '20～30 秒', '2 分鐘'], correctIndex: 2, points: 15 },
            { id: 'mc3', type: 'choice', text: '執行「接觸傳染防護」（Contact Precautions）時，最需要加強穿戴的防護裝備是？', options: ['N95 口罩', '手套與隔離衣', '護目鏡', '鉛衣'], correctIndex: 1, points: 15 },
            { id: 'mc4', type: 'choice', text: '發生針扎意外，除了立即處理傷口，接下來「最優先」該做的是？', options: ['自行上網查資料', '立即通報並依院內感染管制流程處理', '先觀察一週再說', '直接請假回家休息'], correctIndex: 1, points: 20 },
            { id: 'mc5', type: 'choice', text: '下列何者「不是」正確的醫療廢棄物分類方式？', options: ['尖銳物品丟入利器盒', '被血液污染的紗布視為感染性事業廢棄物', '將針具與一般垃圾混合丟棄', '生物性廢棄物依規定滅菌後處理'], correctIndex: 2, points: 20 }
        ];

        let state = {
            screen: 'login',
            playerId: '',
            name: '',
            questions: [],
            currentIndex: 0,
            score: 0,
            correct: 0,
            total: 0,
            feedback: null,
            locked: false,
            leaderboard: {},
            stats: {},
            registrationOpen: true,
            lbPage: 1
        };

        let pollTimer = null;
        let lastKnownRegOpen = null;

        async function fetchState(action, extraParams) {
            try {
                const res = await fetch(apiUrl(Object.assign({ action: action }, extraParams || {})));
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                state.leaderboard = data.leaderboard || {};
                state.stats = data.stats || {};
                state.registrationOpen = (data.registrationOpen !== false);
                return data;
            } catch (e) {
                console.error('與伺服器溝通失敗:', e.message);
                return null;
            }
        }

        async function updateMyEntry(finished) {
            if (!state.playerId) return;
            await fetchState('update', {
                playerId: sanitizeKey(state.playerId),
                name: state.name,
                score: state.score,
                correct: state.correct,
                total: state.total,
                finished: !!finished
            });
            renderBoardList();
        }

        function logAnswerStat(questionId, isCorrect) {
            fetchState('logAnswer', { questionId: questionId, correct: !!isCorrect });
        }

        async function refreshLeaderboard() {
            await fetchState('list');
            renderBoardList();
            if (state.screen === 'login' && state.registrationOpen !== lastKnownRegOpen) {
                lastKnownRegOpen = state.registrationOpen;
                render();
            } else {
                lastKnownRegOpen = state.registrationOpen;
            }
        }

        function startPolling() {
            if (pollTimer) clearInterval(pollTimer);
            pollTimer = setInterval(refreshLeaderboard, 2000);
        }

        function sortedEntries() {
            return Object.entries(state.leaderboard)
                .sort((a, b) => (b[1].score - a[1].score) || (b[1].correct - a[1].correct));
        }

        function boardHtml() {
            return `
                                            <div class="card">
                                              <div class="board-head"><div class="live-dot"></div><div class="board-title">🔥 得分排行榜 (即時)</div></div>
                                              <div class="board-sub">依分數排序，每 2 秒自動更新</div>
                                              <div class="board-total-label">總積分</div>
                                              <div id="lb-list"></div>
                                              <div id="lb-pagination"></div>
                                            </div>
                                          `;
        }

        const LB_PAGE_SIZE = 20;

        function renderBoardList() {
            const el = document.getElementById('lb-list');
            const pagEl = document.getElementById('lb-pagination');
            if (!el) return;
            const entries = sortedEntries();
            if (entries.length === 0) {
                el.innerHTML = `<div class="lb-empty">🎯 還沒有人開始作答</div>`;
                if (pagEl) pagEl.innerHTML = '';
                return;
            }

            const totalPages = Math.max(1, Math.ceil(entries.length / LB_PAGE_SIZE));
            if (state.lbPage > totalPages) state.lbPage = totalPages;
            if (state.lbPage < 1) state.lbPage = 1;

            const startIdx = (state.lbPage - 1) * LB_PAGE_SIZE;
            const pageEntries = entries.slice(startIdx, startIdx + LB_PAGE_SIZE);

            const medals = ['🥇', '🥈', '🥉'];
            el.innerHTML = pageEntries.map(([id, e], idx) => {
                const i = startIdx + idx;
                const isMe = id === state.playerId;
                const rankDisplay = medals[i] || (i + 1);
                return `
                                              <div class="lb-row ${isMe ? 'me' : ''}">
                                                <div class="lb-rank">${rankDisplay}</div>
                                                <div class="lb-name" title="${escapeHtml(e.name)}">${escapeHtml(e.name)}${isMe ? ' (你)' : ''}</div>
                                                <div class="lb-correct">✓ ${e.correct}/${e.total}</div>
                                                <div class="lb-score">${e.score}</div>
                                              </div>
                                            `;
            }).join('');

            if (pagEl) {
                if (totalPages <= 1) {
                    pagEl.innerHTML = '';
                } else {
                    let buttons = '';
                    buttons += `<button class="lb-page-btn" id="lbPrevBtn" ${state.lbPage === 1 ? 'disabled' : ''}>‹</button>`;
                    for (let p = 1; p <= totalPages; p++) {
                        buttons += `<button class="lb-page-btn ${p === state.lbPage ? 'active' : ''}" data-page="${p}">${p}</button>`;
                    }
                    buttons += `<button class="lb-page-btn" id="lbNextBtn" ${state.lbPage === totalPages ? 'disabled' : ''}>›</button>`;
                    pagEl.innerHTML = buttons + `<div class="lb-page-info">共 ${entries.length} 人・第 ${state.lbPage}/${totalPages} 頁</div>`;

                    const prevBtn = document.getElementById('lbPrevBtn');
                    const nextBtn = document.getElementById('lbNextBtn');
                    if (prevBtn) prevBtn.onclick = () => { state.lbPage -= 1; renderBoardList(); };
                    if (nextBtn) nextBtn.onclick = () => { state.lbPage += 1; renderBoardList(); };
                    pagEl.querySelectorAll('.lb-page-btn[data-page]').forEach(btn => {
                        btn.onclick = () => { state.lbPage = parseInt(btn.dataset.page, 10); renderBoardList(); };
                    });
                }
            }
        }

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        function render() {
            const app = document.getElementById('app');
            if (state.screen === 'login') {
                app.innerHTML = `
                                              <div class="row g-3">
                                                <div class="col-lg-8">
                                                  <div class="card">
                                                    <p class="eyebrow">🎮 開始作答</p>
                                                    <h2>輸入你的姓名與職稱 加入擂台</h2>
                                                    ${state.registrationOpen ? `
                                                      <label for="nameInput">姓名 職稱</label>
                                                      <input id="nameInput" type="text" placeholder="例如：王小明護理師" maxlength="20">
                                                      <button class="btn btn-primary btn-block" id="joinBtn">🚀 加入作答</button>
                                                    ` : `
                                                      <div class="closed-msg">🚫 目前尚未開放加入作答，請稍候主辦人開放後再試一次</div>
                                                    `}
                                                  </div>
                                                </div>
                                                <div class="col-lg-4">${boardHtml()}</div>
                                              </div>
                                            `;
                if (state.registrationOpen) {
                    document.getElementById('joinBtn').onclick = onJoin;
                    document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') onJoin(); });
                }
                renderBoardList();
            }
            else if (state.screen === 'game') {
                const q = state.questions[state.currentIndex];
                const pct = Math.round((state.currentIndex / state.questions.length) * 100);
                const answersHtml = q.type === 'choice'
                    ? `<div class="choice-list">${q.options.map((opt, idx) => `
                                                      <button class="choice-btn" id="choiceBtn${idx}" ${state.locked ? 'disabled' : ''}><span class="choice-letter">${String.fromCharCode(65 + idx)}</span>${escapeHtml(opt)}</button>
                                                    `).join('')}</div>`
                    : `<div class="answers">
                                                      <button class="ans-btn true" id="btnTrue" ${state.locked ? 'disabled' : ''}>⭕ 是 / 正確</button>
                                                      <button class="ans-btn false" id="btnFalse" ${state.locked ? 'disabled' : ''}>❌ 否 / 錯誤</button>
                                                    </div>`;
                app.innerHTML = `
                                              <div class="row g-3">
                                                <div class="col-lg-8">
                                                  <div class="card">
                                                    <div class="dial-zone">
                                                      <div class="dial" id="dial">
                                                        <div class="dial-inner">
                                                          <div class="dial-score" id="scoreNum">${state.score}</div>
                                                          <div class="dial-label">目前分數</div>
                                                        </div>
                                                      </div>
                                                    </div>
                                                    <div class="progress-wrap">
                                                      第 ${state.currentIndex + 1} / ${state.questions.length} 題　<span class="name-chip">👤 ${escapeHtml(state.name)}</span>
                                                      <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
                                                    </div>
                                                    <div class="qcard">
                                                      <div class="qpoints">⭐ 本題配分：${q.points} 分　${q.type === 'choice' ? '· 選擇題' : '· 是非題'}</div>
                                                      <div class="qtext">${escapeHtml(q.text)}</div>
                                                    </div>
                                                    ${answersHtml}
                                                    <div class="feedback" id="feedbackZone">${state.locked ? '📮 已送出，前往下一題…' : ''}</div>
                                                  </div>
                                                </div>
                                                <div class="col-lg-4">${boardHtml()}</div>
                                              </div>
                                            `;
                if (q.type === 'choice') {
                    q.options.forEach((opt, idx) => {
                        document.getElementById('choiceBtn' + idx).onclick = () => answer(idx);
                    });
                } else {
                    document.getElementById('btnTrue').onclick = () => answer(true);
                    document.getElementById('btnFalse').onclick = () => answer(false);
                }
                renderBoardList();
            }
            else if (state.screen === 'end') {
                const entries = sortedEntries();
                const myRank = entries.findIndex(([id]) => id === state.playerId) + 1;
                app.innerHTML = `
                                              <div class="row g-3">
                                                <div class="col-lg-8">
                                                  <div class="card">
                                                    <span class="trophy">🏆</span>
                                                    <p class="eyebrow text-center">作答完成</p>
                                                    <h2 class="text-center">${escapeHtml(state.name)}，你的結果出爐了！</h2>
                                                    <p class="sub text-center">${myRank > 0 ? `目前排名第 ${myRank} 名` : ''}</p>
                                                    <div class="end-stats">
                                                      <div class="stat"><div class="num">${state.score}</div><div class="lbl">總分</div></div>
                                                      <div class="stat"><div class="num">${state.correct}/${state.total}</div><div class="lbl">答對題數</div></div>
                                                      <div class="stat"><div class="num">${myRank > 0 ? ('#' + myRank) : '-'}</div><div class="lbl">目前排名</div></div>
                                                    </div>
                                                    <p class="sub text-center" style="margin:0;">🎉 感謝作答，本次題組已全部完成！</p>
                                                  </div>
                                                </div>
                                                <div class="col-lg-4">${boardHtml()}</div>
                                              </div>
                                            `;
                renderBoardList();
            }
        }

        function onJoin() {
            const input = document.getElementById('nameInput');
            const name = (input.value || '').trim();
            if (!name) {
                input.focus();
                input.style.borderColor = 'var(--coral)';
                return;
            }
            state.name = name;
            state.playerId = sanitizeKey(name) + '_' + Math.random().toString(36).slice(2, 6);
            state.questions = QUESTIONS.slice(); // 依 id 順序出題，不隨機
            state.currentIndex = 0;
            state.score = 0;
            state.correct = 0;
            state.total = 0;
            state.feedback = null;
            state.locked = false;
            state.screen = 'game';
            updateMyEntry(false);
            render();
        }

        function answer(selected) {
            if (state.locked) return;
            state.locked = true;
            const q = state.questions[state.currentIndex];
            const isCorrect = q.type === 'choice' ? (selected === q.correctIndex) : (selected === q.answer);
            const delta = isCorrect ? q.points : -0;
            state.score = Math.max(0, state.score + delta);
            state.total += 1;
            if (isCorrect) state.correct += 1;

            const scoreNum = document.getElementById('scoreNum');
            if (scoreNum) scoreNum.textContent = state.score;

            if (q.type === 'choice') {
                q.options.forEach((opt, idx) => {
                    const btn = document.getElementById('choiceBtn' + idx);
                    if (!btn) return;
                    btn.disabled = true;
                    if (idx === selected) btn.classList.add('selected');
                });
            } else {
                document.getElementById('btnTrue').disabled = true;
                document.getElementById('btnFalse').disabled = true;
            }
            const fz = document.getElementById('feedbackZone');
            if (fz) fz.textContent = '📮 已送出，前往下一題…';

            logAnswerStat(q.id, isCorrect);

            const isLast = (state.currentIndex + 1) >= state.questions.length;
            updateMyEntry(isLast);

            setTimeout(() => {
                state.currentIndex += 1;
                state.locked = false;
                if (state.currentIndex >= state.questions.length) {
                    state.screen = 'end';
                }
                render();
            }, 500);
        }

        async function onResetBoard() {
            if (!confirm('確定要清空所有玩家的排行榜與答錯率統計資料嗎？此動作無法復原。')) return;
            await fetchState('reset');
            render();
        }

        async function onToggleRegistration() {
            const newOpen = !state.registrationOpen;
            await fetchState('setRegistration', { open: newOpen });
            render();
        }

        (async function init() {
            await fetchState('list');
            lastKnownRegOpen = state.registrationOpen;
            render();
            startPolling();
        })();

        /* =====================================================================
           以下為新增的視覺特效程式碼（雲層 / 光塵 / 流星 / 游標光暈 / 按鈕水波紋）
           純屬疊加效果，不影響上方任何計分、排行榜、API 串接邏輯。
           ===================================================================== */
        function buildClouds(layerId, count, sizeRange, opacityRange) {
            const layer = document.getElementById(layerId);
            if (!layer) return;
            let html = '';
            for (let i = 0; i < count; i++) {
                const w = sizeRange[0] + Math.random() * (sizeRange[1] - sizeRange[0]);
                const h = w * (0.35 + Math.random() * 0.15);
                const top = Math.random() * 100;
                const left = Math.random() * 120 - 10;
                const op = opacityRange[0] + Math.random() * (opacityRange[1] - opacityRange[0]);
                const lit = Math.random() > 0.5;
                const color = lit
                    ? 'radial-gradient(ellipse at 35% 35%, var(--cloud-lit), rgba(255,255,255,0) 70%)'
                    : 'radial-gradient(ellipse at 35% 35%, rgba(255,255,255,0.7), var(--cloud-shadow) 75%)';
                html += `<div class="cloud" style="top:${top}%;left:${left}%;width:${w}px;height:${h}px;opacity:${op};background:${color};"></div>`;
            }
            layer.innerHTML = html;
        }

        function buildDust(count) {
            const layer = document.getElementById('dustLayer');
            if (!layer) return;
            let html = '';
            for (let i = 0; i < count; i++) {
                const left = Math.random() * 100;
                const dur = 10 + Math.random() * 14;
                const delay = Math.random() * 14;
                const twinkleDelay = Math.random() * 3;
                const size = 2 + Math.random() * 2.5;
                html += `<div class="dust" style="left:${left}%; bottom:-5%; width:${size}px; height:${size}px; animation-duration:${dur}s, 3s; animation-delay:${delay}s, ${twinkleDelay}s;"></div>`;
            }
            layer.innerHTML = html;
        }

        function spawnShootingStar() {
            const stage = document.getElementById('skyStage');
            if (!stage) return;
            const star = document.createElement('div');
            star.className = 'shootingStar';
            star.style.top = (5 + Math.random() * 25) + '%';
            star.style.left = (55 + Math.random() * 35) + '%';
            stage.appendChild(star);
            setTimeout(() => star.remove(), 1200);
        }

        function initCursorGlow() {
            const glow = document.getElementById('cursorGlow');
            if (!glow) return;
            let hideTimer = null;
            window.addEventListener('mousemove', (e) => {
                glow.style.opacity = '1';
                glow.style.left = e.clientX + 'px';
                glow.style.top = e.clientY + 'px';
                clearTimeout(hideTimer);
                hideTimer = setTimeout(() => { glow.style.opacity = '0'; }, 1200);

                // 雲層與光束依滑鼠位置做微視差
                const px = (e.clientX / window.innerWidth - 0.5);
                const py = (e.clientY / window.innerHeight - 0.5);
                const back = document.getElementById('cloudBack');
                const mid = document.getElementById('cloudMid');
                const front = document.getElementById('cloudFront');
                if (back) back.style.marginLeft = (px * 10) + 'px';
                if (mid) mid.style.marginLeft = (px * 20) + 'px';
                if (front) front.style.marginLeft = (px * 34) + 'px';
                const rays = document.querySelector('.godrays');
                if (rays) rays.style.marginTop = (py * 16) + 'px';
            }, { passive: true });
        }

        function initRippleEffect() {
            document.addEventListener('click', (e) => {
                const target = e.target.closest('.btn, .ans-btn, .choice-btn');
                if (!target) return;
                const rect = target.getBoundingClientRect();
                const ripple = document.createElement('span');
                const size = Math.max(rect.width, rect.height);
                ripple.className = 'ripple';
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
                ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
                target.appendChild(ripple);
                setTimeout(() => ripple.remove(), 650);
            });
        }

        function initSkyEffects() {
            buildClouds('cloudBack', 4, [160, 260], [0.3, 0.5]);
            buildClouds('cloudMid', 4, [120, 200], [0.4, 0.65]);
            buildClouds('cloudFront', 3, [90, 150], [0.55, 0.85]);
            buildDust(26);
            initCursorGlow();
            initRippleEffect();
            setInterval(spawnShootingStar, 6000);
            setTimeout(spawnShootingStar, 1500);
        }

        initSkyEffects();
    </script>
</body>
</html>
