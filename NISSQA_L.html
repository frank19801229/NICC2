<!DOCTYPE html>
<!--
  感控問答擂台（甜美蘿莉風）
  ------------------------------------------------------------
  單機檔案，前端用 vanilla JS 依 state.screen 手動切換三個畫面：
    login（登入）→ game（答題）→ end（結算）
  分數/排行榜資料存在外部的 Google Apps Script（見下方 APPS_SCRIPT_URL），
  前端用 fetchState() 統一呼叫，並用輕量輪詢偵測「是否開放作答」的狀態變化。
  作答過程不會顯示正確答案，只會提示「已送出」。
  ------------------------------------------------------------
-->
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>感控問答擂台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&family=Chewy&display=swap');

        :root {
            /* ---------- 甜美蘿莉 Sweet Lolita 色票（所有顏色都用這裡的變數，方便統一改色） ---------- */
            --pink: #FF7EB6;
            --pink-dark: #E8478F;
            --pink-pale: #FFE3F0;
            --lavender: #C9A6FF;
            --lavender-dark: #9B6FE8;
            --cyan: #7FE0E8;
            --mint: #9BE8CC;
            --yellow: #FFD966;
            --green: #57D08A;
            --coral: #FF8FA3;
            --ink: #5B3A52;   /* 主要文字顏色（深梅紫） */
            --slate: #B98CB4; /* 次要/說明文字顏色 */
            --card: #FFFFFF;
            --cream: #FFF8FC; /* 卡片內部淺色底 */
            --line: #FFD3EA;  /* 邊框/分隔線顏色 */
        }

        * {
            box-sizing: border-box; /* 讓 padding/border 都算進寬高裡，版面比較好抓 */
        }

        html, body {
            overflow-x: hidden; /* 飄浮的裝飾 emoji 會跑到畫面外，這裡擋住橫向捲軸 */
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Noto Sans TC', sans-serif;
            color: var(--ink);
            /* 多層放射狀漸層疊在一起，做出柔和的粉彩雲霧背景 */
            background:
                radial-gradient(circle at 12% 8%, rgba(255,182,217,0.55), transparent 42%),
                radial-gradient(circle at 92% 6%, rgba(201,166,255,0.50), transparent 40%),
                radial-gradient(circle at 50% 105%, rgba(255,217,102,0.35), transparent 45%),
                radial-gradient(circle at 85% 70%, rgba(155,232,204,0.35), transparent 40%),
                linear-gradient(160deg, #FFEAF5 0%, #FDE3FF 40%, #EFE6FF 70%, #E8F6FF 100%);
            background-attachment: fixed; /* 捲動頁面時背景固定不跟著捲，營造沉浸感 */
            position: relative;
        }

        /* 閃亮亮的粉塵背景：兩層小圓點疊出星塵感，用 twinkle 動畫讓它們忽明忽暗 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none; /* 不擋住底下的點擊操作 */
            background-image:
                radial-gradient(circle, rgba(255,255,255,0.9) 1.5px, transparent 1.6px),
                radial-gradient(circle, rgba(255,255,255,0.7) 1px, transparent 1.1px);
            background-size: 90px 90px, 55px 55px;
            background-position: 0 0, 30px 40px;
            animation: twinkle 5s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.55; }
            50% { opacity: 1; }
        }

        /* 飄浮愛心/星星裝飾層：容器本身固定滿版，裡面的 .floaty 元素由 JS 動態產生 */
        #floatyLayer {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        /* 單一顆飄浮 emoji 的樣式，實際飄浮軌跡由 floatUp 動畫控制 */
        .floaty {
            position: absolute;
            bottom: -60px;
            font-size: 1.4rem;
            opacity: 0.75;
            filter: drop-shadow(0 2px 4px rgba(232,71,143,0.25));
            animation-name: floatUp;
            animation-timing-function: ease-in;
            animation-iteration-count: infinite;
        }

        /* 從畫面底下飄到頂端消失，同時旋轉一圈、中途稍微放大再縮小 */
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0; }
            10% { opacity: 0.85; }
            50% { transform: translateY(-52vh) rotate(180deg) scale(1.05); }
            90% { opacity: 0.7; }
            100% { transform: translateY(-105vh) rotate(360deg) scale(0.9); opacity: 0; }
        }

        .wrap {
            max-width: 1120px;
            margin: 0 auto;
            padding: 22px 16px 60px;
            position: relative;
            z-index: 1; /* 蓋在背景裝飾層（z-index:0）之上，確保內容可以被點擊 */
        }

        /* ---------- 頂部品牌列 ---------- */
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 22px;
            justify-content: center;
            position: relative;
        }

            .brand .mascot {
                font-size: 2.1rem;
                filter: drop-shadow(0 4px 10px rgba(232,71,143,0.45));
                animation: bounce 2.4s ease-in-out infinite;
                display: inline-block;
            }

            .brand .mascot-sparkle {
                position: absolute;
                left: calc(50% - 92px);
                top: -6px;
                font-size: 1rem;
                animation: sparkleSpin 3s linear infinite;
                pointer-events: none;
            }

        @keyframes bounce {
            0%,100% {
                transform: translateY(0) rotate(-6deg);
            }

            50% {
                transform: translateY(-8px) rotate(6deg);
            }
        }

        @keyframes sparkleSpin {
            0% { transform: rotate(0deg) translateX(4px) rotate(0deg); opacity: 0.4; }
            50% { opacity: 1; }
            100% { transform: rotate(360deg) translateX(4px) rotate(-360deg); opacity: 0.4; }
        }

        .brand h1 {
            font-family: 'Baloo 2', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 0.02em;
            margin: 0;
            background: linear-gradient(90deg, var(--pink-dark), var(--lavender-dark) 55%, var(--pink-dark));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 0 rgba(255,255,255,0.7));
        }

        .brand .badge-live {
            font-family: 'Baloo 2', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--yellow), var(--pink));
            color: #7a3b00;
            padding: 4px 14px;
            border-radius: 999px;
            box-shadow: 0 4px 10px rgba(255,140,180,0.55), inset 0 2px 0 rgba(255,255,255,0.6);
            border: 2px solid #fff;
            position: relative;
        }

            .brand .badge-live::before {
                content: '✨';
                margin-right: 3px;
            }

        /* ---------- 卡片（蕾絲糖果風） ---------- */
        .card {
            background: linear-gradient(180deg, #FFFFFF 0%, #FFFBFE 100%);
            border: 2.5px solid var(--line);
            border-radius: 30px;
            padding: 30px 28px 28px;
            box-shadow: 0 20px 45px -18px rgba(232,71,143,0.45), 0 0 0 6px rgba(255,255,255,0.55) inset;
            position: relative;
            overflow: hidden;
        }

            /* 卡片右上角一團粉色光暈裝飾 */
            .card::before {
                content: '';
                position: absolute;
                top: -40px;
                right: -40px;
                width: 150px;
                height: 150px;
                border-radius: 50%;
                background: radial-gradient(circle, rgba(255,126,182,0.22), transparent 70%);
            }

            /* 卡片左下角一團淺紫光暈裝飾，跟右上角互相呼應 */
            .card::after {
                content: '';
                position: absolute;
                bottom: -50px;
                left: -50px;
                width: 160px;
                height: 160px;
                border-radius: 50%;
                background: radial-gradient(circle, rgba(201,166,255,0.20), transparent 70%);
            }

            /* 卡片左上角歪斜的蝴蝶結貼紙（🎀），純裝飾用 */
            .card > .ribbon-corner {
                position: absolute;
                top: 14px;
                left: -6px;
                font-size: 1.5rem;
                transform: rotate(-18deg);
                filter: drop-shadow(0 2px 3px rgba(0,0,0,0.15));
                z-index: 2;
            }

        .eyebrow {
            font-family: 'Baloo 2', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--green);
            margin: 0 0 6px;
            position: relative;
            z-index: 1;
        }

        h2 {
            font-family: 'Baloo 2', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            margin: 0 0 8px;
            color: var(--ink);
            position: relative;
            z-index: 1;
        }

        p.sub {
            color: var(--pink-dark);
            margin: 0 0 22px;
            line-height: 1.7;
            font-size: 1.3rem;
            font-weight: 800;
            position: relative;
            z-index: 1;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--slate);
            font-weight: 600;
            margin-bottom: 6px;
            position: relative;
            z-index: 1;
        }

            label::before {
                content: '🐾 '; /* 每個 label 前面加一個小肉球符號，呼應蘿莉/兔子主題 */
            }

        input[type=text] {
            width: 100%;
            padding: 15px 18px;
            border-radius: 18px;
            border: 2.5px solid var(--line);
            font-size: 1.5rem;
            font-family: inherit;
            background: var(--cream);
            color: var(--ink);
            transition: border-color .15s ease, box-shadow .15s ease, background .15s ease;
            position: relative;
            z-index: 1;
        }

            input[type=text]:focus {
                outline: none;
                border-color: var(--pink);
                box-shadow: 0 0 0 5px rgba(255,126,182,0.22);
                background: #fff;
            }

        /* ---------- 按鈕（軟糖 / 蝴蝶結風） ---------- */
        .btn {
            appearance: none;
            border: none;
            cursor: pointer;
            font-family: 'Baloo 2', sans-serif;
            font-weight: 700;
            font-size: 1.05rem;
            border-radius: 18px;
            padding: 15px 22px;
            transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
            position: relative;
            overflow: hidden;
        }

            /* 按鈕表面一道斜向高光，做出糖果/軟糖般的光澤感 */
            .btn::after {
                content: '';
                position: absolute;
                top: 0; left: -10%;
                width: 40%; height: 100%;
                background: linear-gradient(120deg, rgba(255,255,255,0.55), rgba(255,255,255,0) 70%);
                transform: skewX(-20deg);
                pointer-events: none;
            }

            .btn:hover {
                transform: translateY(-2px) rotate(-0.5deg); /* 輕微浮起 + 歪一點角度，更活潑 */
            }

            .btn:active {
                transform: scale(0.95); /* 按下去縮小一點，模擬按壓回饋 */
            }

        .btn-primary {
            background: linear-gradient(135deg, var(--pink), var(--lavender));
            color: #fff;
            box-shadow: 0 10px 24px -8px rgba(232,71,143,0.65), inset 0 2px 0 rgba(255,255,255,0.5);
            border: 2px solid #fff;
        }

            .btn-primary::before {
                content: '🎀 '; /* 主要按鈕前面固定加一個蝴蝶結符號 */
            }

            .btn-primary:hover {
                filter: brightness(1.08);
            }

        .btn-block {
            width: 100%;
            margin-top: 18px;
            font-size: 1.5rem;
        }

        .btn-ghost {
            background: rgba(255,255,255,0.6);
            color: var(--slate);
            border: 2px solid var(--line);
            font-weight: 600;
            font-size: 0.9rem;
        }

            .btn-ghost:hover {
                border-color: var(--pink);
                color: var(--pink-dark);
                background: #fff;
            }

        .foot-link {
            /* 卡片下方一排文字連結（例如管理員用的重設/開關按鈕），置中自動換行排列 */
            margin-top: 18px;
            text-align: center;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px 16px;
        }

            .foot-link button {
                background: none;
                border: none;
                color: var(--slate);
                font-size: 0.75rem;
                text-decoration: underline;
                cursor: pointer;
                font-family: inherit;
            }

        /* ---------- 分數圓盤（棉花糖甜甜圈風） ---------- */
        .dial-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px;
            position: relative;
        }

        /* 圓盤外圍一圈虛線光暈，用 spinSlow 讓它慢慢轉動，增加「轉盤」的感覺 */
        .dial-zone::before {
            content: '';
            position: absolute;
            top: -6px;
            width: 178px;
            height: 178px;
            border-radius: 50%;
            border: 2px dashed rgba(232,71,143,0.35);
            animation: spinSlow 12s linear infinite;
        }

        @keyframes spinSlow {
            to { transform: rotate(360deg); }
        }

        /* 分數圓盤本體：用 conic-gradient 做出四色漸層的甜甜圈外框 */
        .dial {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            border-radius: 50%;
            background: conic-gradient(var(--mint) 0deg, var(--pink) 120deg, var(--lavender) 240deg, var(--yellow) 360deg);
            padding: 8px;
            box-shadow: 0 12px 28px -10px rgba(155,111,232,0.55);
        }

            /* 圓盤中間挖空成白色底，蓋住 conic-gradient 中央，只留外圈當彩色框 */
            .dial::after {
                content: '';
                position: absolute;
                inset: 8px;
                border-radius: 50%;
                background: radial-gradient(circle at 32% 28%, #ffffff, #fff6fb 70%);
            }

            /* 圓盤正上方掛一個小蝴蝶結裝飾 */
            .dial::before {
                content: '🎀';
                position: absolute;
                top: -14px;
                left: 50%;
                transform: translateX(-50%);
                font-size: 1.3rem;
                z-index: 3;
                filter: drop-shadow(0 2px 3px rgba(0,0,0,0.2));
            }

        .dial-inner {
            position: relative;
            z-index: 2; /* 蓋在 .dial::after 的白色底之上，讓分數文字看得見 */
            text-align: center;
        }

        /* 註：以下 flash-correct / flash-wrong 這兩個「答對/答錯」的圓盤動畫效果
           目前 JS 沒有實際套用（因為現在答題後不會揭曉對錯，只會顯示「已送出」），
           樣式保留著，之後如果想恢復「答對/答錯即時特效」可以直接在 answer() 裡加上對應 class。 */
        .dial.flash-correct {
            animation: pulseGood .7s ease-out;
        }

        .dial.flash-wrong {
            animation: pulseBad .7s ease-out;
        }

        @keyframes pulseGood {
            0% {
                box-shadow: 0 0 0 0 rgba(87,208,138,0.55);
            }

            100% {
                box-shadow: 0 0 0 30px rgba(87,208,138,0);
            }
        }

        @keyframes pulseBad {
            0% {
                box-shadow: 0 0 0 0 rgba(255,143,163,0.55);
            }

            100% {
                box-shadow: 0 0 0 30px rgba(255,143,163,0);
            }
        }

        .dial-score {
            font-family: 'Baloo 2', sans-serif;
            font-size: 2.7rem;
            font-weight: 800;
            color: var(--pink-dark);
        }

        .dial-label {
            font-size: 1.3rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--lavender-dark);
            font-weight: 600;
        }

        .flash-correct .dial-score {
            color: var(--green);
        }

        .flash-wrong .dial-score {
            color: var(--coral);
        }

        .progress-wrap {
            /* 「第 X/Y 題」文字＋玩家姓名標籤＋下方的進度條，整組置中排列 */
            font-family: 'Baloo 2', sans-serif;
            font-size: 1.2rem;
            color: var(--ink);
            text-align: center;
            margin-bottom: 18px;
            font-weight: 600;
        }

            .progress-wrap .name-chip {
                display: inline-block;
                background: linear-gradient(135deg, var(--pink-pale), #fff);
                color: var(--pink-dark);
                padding: 3px 12px;
                border-radius: 999px;
                margin-left: 4px;
                border: 1.5px solid var(--line);
            }

        .progress-bar-track {
            height: 14px;
            border-radius: 999px;
            background: var(--pink-pale);
            overflow: hidden;
            margin-top: 8px;
            border: 1.5px solid #fff;
            box-shadow: inset 0 1px 3px rgba(155,111,232,0.25); /* 內凹陰影，做出溝槽感 */
        }

        /* 進度條填色：寬度由 JS 依 currentIndex 算出的百分比控制（見 render() 的 pct 變數） */
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--yellow), var(--pink), var(--lavender));
            background-size: 200% 100%;
            transition: width .35s ease;
            border-radius: 999px;
            animation: shimmerBar 2.4s linear infinite; /* 漸層持續橫向流動，做出「流光」效果 */
            position: relative;
        }

        @keyframes shimmerBar {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        /* ---------- 題目卡 ---------- */
        .qcard {
            /* 斜紋底紋 + 淺色漸層，搭配虛線邊框，做出「便條紙/糖果紙」的質感 */
            background:
                repeating-linear-gradient(135deg, rgba(255,126,182,0.05) 0 12px, rgba(201,166,255,0.05) 12px 24px),
                linear-gradient(180deg, #FFFBFE, #FFF1F8);
            border: 2.5px dashed var(--line);
            border-radius: 24px;
            padding: 26px;
            margin-bottom: 22px;
            position: relative;
        }

        /* 「本題配分：X 分」的膠囊型標籤 */
        .qpoints {
            display: inline-block;
            font-family: 'Baloo 2', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: #fff;
            background: linear-gradient(135deg, var(--lavender-dark), var(--pink-dark));
            border-radius: 999px;
            padding: 5px 16px;
            margin-bottom: 16px;
            box-shadow: 0 6px 14px -4px rgba(155,111,232,0.5);
        }

        .qpoints::before {
            content: '⭐ ';
        }

        .qtext {
            font-size: 1.7rem;
            line-height: 1.75;
            font-weight: 600;
            color: var(--ink);
        }

        /* 是非題的「是/否」兩個大按鈕，左右各半 */
        .answers {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .ans-btn {
            padding: 22px 10px;
            border-radius: 20px;
            border: none;
            font-family: 'Baloo 2', sans-serif;
            font-weight: 800;
            font-size: 1.9rem;
            cursor: pointer;
            color: #fff;
            transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
            position: relative;
            overflow: hidden;
        }

            .ans-btn::after {
                content: '';
                position: absolute;
                top: 0; left: -10%; width: 35%; height: 100%;
                background: linear-gradient(120deg, rgba(255,255,255,0.55), rgba(255,255,255,0) 70%);
                transform: skewX(-20deg);
            }

            .ans-btn.true {
                background: linear-gradient(135deg, #B8F1CE, var(--green));
                box-shadow: 0 10px 22px -8px rgba(87,208,138,0.6), inset 0 2px 0 rgba(255,255,255,0.5);
                border: 2px solid #fff;
            }

            .ans-btn.false {
                background: linear-gradient(135deg, #FFC2CE, var(--coral));
                box-shadow: 0 10px 22px -8px rgba(255,143,163,0.6), inset 0 2px 0 rgba(255,255,255,0.5);
                border: 2px solid #fff;
            }

            .ans-btn:hover:not(:disabled) {
                filter: brightness(1.06);
                transform: translateY(-2px) scale(1.02) rotate(-0.5deg);
            }

            .ans-btn:active {
                transform: scale(0.95);
            }

            .ans-btn:disabled {
                opacity: 0.45;
                cursor: not-allowed;
                transform: none;
            }

        .feedback {
            text-align: center;
            font-family: 'Baloo 2', sans-serif;
            font-size: 1rem;
            min-height: 24px;
            margin-top: 16px;
            font-weight: 700;
            color: var(--pink-dark);
        }

            /* 註：.ok / .no 這兩個「答對/答錯提示色」目前 JS 沒有實際套用，
               因為現在只會顯示中性的「已送出」訊息，不會揭曉對錯。 */
            .feedback.ok {
                color: var(--green);
            }

            .feedback.no {
                color: var(--coral);
            }

        /* ---------- 結算畫面 ---------- */
        /* 總分／答對題數／目前排名，三個統計方塊並排 */
        .end-stats {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 12px;
            margin: 22px 0;
        }

        .stat {
            background: linear-gradient(180deg,#FFFBFE,#FFEAF6);
            border: 2px solid var(--line);
            border-radius: 18px;
            padding: 18px 8px;
            text-align: center;
            box-shadow: 0 6px 14px -8px rgba(232,71,143,0.4);
        }

            .stat .num {
                font-family: 'Baloo 2', sans-serif;
                font-size: 1.6rem;
                font-weight: 800;
                color: var(--pink-dark);
            }

            .stat .lbl {
                font-size: 0.72rem;
                color: var(--slate);
                margin-top: 4px;
                font-weight: 600;
            }

        /* 結算畫面上方的皇冠 emoji，會輕輕上下浮動＋搖擺 */
        .trophy {
            font-size: 4rem;
            text-align: center;
            display: block;
            margin-bottom: 6px;
            filter: drop-shadow(0 6px 12px rgba(232,71,143,0.35));
            animation: crownFloat 2.4s ease-in-out infinite;
        }

        @keyframes crownFloat {
            0%, 100% { transform: translateY(0) rotate(-4deg); }
            50% { transform: translateY(-8px) rotate(4deg); }
        }

        /* 主辦人關閉報名時，登入畫面顯示的黃色警示框 */
        .closed-msg {
            background: linear-gradient(180deg, #FFF6E0, #FFEFC9);
            border: 2.5px dashed var(--yellow);
            border-radius: 20px;
            padding: 18px;
            text-align: center;
            font-weight: 700;
            color: #9A5B00;
            margin-bottom: 6px;
            font-family: 'Baloo 2', sans-serif;
        }

        /* ---------- 選擇題按鈕 ---------- */
        .choice-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .choice-btn {
            display: flex;
            align-items: center;
            text-align: left;
            width: 100%;
            padding: 15px 18px;
            border-radius: 18px;
            border: 2.5px solid var(--line);
            background: var(--cream);
            font-family: 'Noto Sans TC', sans-serif;
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--ink);
            cursor: pointer;
            transition: all .12s ease;
        }

            .choice-btn:hover:not(:disabled) {
                border-color: var(--lavender-dark);
                background: #F6F0FF;
                transform: translateY(-2px) scale(1.01);
                box-shadow: 0 8px 16px -8px rgba(155,111,232,0.5);
            }

            .choice-btn:disabled {
                cursor: not-allowed;
            }

            /* 註：.correct / .wrong-selected 這兩個「答對變綠/答錯變紅」樣式目前 JS 沒有套用，
               現在選錯或選對都只會加上中性的 .selected（見下方），不會揭曉正確答案。 */
            .choice-btn.correct {
                background: linear-gradient(135deg, #B8F1CE, var(--green));
                border-color: var(--green);
                color: #fff;
            }

            .choice-btn.wrong-selected {
                background: linear-gradient(135deg, #FFC2CE, var(--coral));
                border-color: var(--coral);
                color: #fff;
            }

            /* 這個才是實際會用到的：標示玩家選了哪一個選項（不透露對錯） */
            .choice-btn.selected {
                background: #F6F0FF;
                border-color: var(--lavender-dark);
                color: var(--ink);
            }

        /* 選項前面的 A/B/C/D 圓形字母標籤 */
        .choice-letter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--pink), var(--lavender));
            color: #fff;
            font-family: 'Baloo 2', sans-serif;
            font-weight: 800;
            font-size: 0.78rem;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .choice-btn.correct .choice-letter,
        .choice-btn.wrong-selected .choice-letter {
            background: rgba(255,255,255,0.35);
        }

        /* ---------- 答錯率長條圖 ----------
           以下這組樣式是給「各題答錯率統計」用的長條圖元件，
           目前畫面上沒有任何地方產生對應的 HTML／呼叫它，屬於保留樣式，
           如果之後想加一個管理員專用的「各題答對率總覽」畫面可以直接用。 */
        .stat-bar-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 11px;
        }

        .stat-bar-label {
            width: 108px;
            flex-shrink: 0;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--ink);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: help;
        }

        .stat-bar-track {
            flex: 1;
            height: 14px;
            border-radius: 999px;
            background: var(--pink-pale);
            overflow: hidden;
        }

        .stat-bar-fill {
            height: 100%;
            border-radius: 999px;
            transition: width .4s ease;
        }

        .stat-bar-pct {
            width: 40px;
            text-align: right;
            font-family: 'Baloo 2', sans-serif;
            font-weight: 800;
            font-size: 0.78rem;
            flex-shrink: 0;
        }

        /* ---------- 點擊亮片 / 彩帶特效 ---------- */
        /* 由 spawnSparkle() 動態產生的亮片元素，由中心點放大並往上飄，同時淡出後自動消失 */
        .tap-sparkle {
            position: fixed;
            pointer-events: none;
            font-size: 1.1rem;
            z-index: 999;
            animation: sparklePop .7s ease-out forwards;
        }

        @keyframes sparklePop {
            0% { transform: translate(-50%,-50%) scale(0.3) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%,-140%) scale(1.1) rotate(90deg); opacity: 0; }
        }

        /* 由 launchConfetti() 動態產生的彩帶紙片，從頂端落下並旋轉、淡出 */
        .confetti-piece {
            position: fixed;
            top: -20px;
            pointer-events: none;
            z-index: 998;
            animation-name: confettiFall;
            animation-timing-function: cubic-bezier(.25,.46,.45,.94);
            animation-fill-mode: forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(540deg); opacity: 0; }
        }

        /* 手機（寬度 575px 以下）調整：答題按鈕字級縮小、間距縮小，避免小螢幕擠不下 */
        @media(max-width:575px) {
            .answers {
                gap: 10px;
            }

            .ans-btn {
                font-size: 1.5rem;
                padding: 18px 6px;
            }

            h2 {
                font-size: 1.35rem;
            }
        }
    </style>
</head>
<body>
    <!-- 由 JS initFloatingBG() 動態塞入飄浮 emoji 的容器，全螢幕固定、蓋在最底層 -->
    <div id="floatyLayer"></div>
    <div class="wrap">
        <!-- 頂部品牌列：吉祥物 + 標題 + 即時挑戰徽章，固定不變 -->
        <div class="brand">
            <span class="mascot-sparkle">✨</span>
            <span class="mascot">🐰</span>
            <h1>感控問答擂台</h1>
            <span class="badge-live">即時挑戰</span>
        </div>
        <!-- 主要內容區：login / game / end 三個畫面都是由 JS 的 render() 動態塞進這裡 -->
        <div id="app"></div>
    </div>
    <script>
        /* =====================================================================
           Google Apps Script 設定 — 請依照 README.md 的步驟部署好 Apps Script
           後，把下面的網址換成你自己的 Web App 網址（結尾是 /exec）。
           ===================================================================== */
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzEJaUPK5WnOauCcXmz0yYlV3alPNa447UC04tNAdwAaJKotixd3Sc6yXCn8jq5Me8ljw/exec";

        /* 房間代碼：同一份 HTML 部署給不同場次/單位使用時，改這個字串即可
           讓彼此的排行榜互相獨立，不會混在一起。 */
        const ROOM_ID = "default-room";

        // 把玩家名稱轉成安全的 key（拿掉特殊符號），用來當作後端儲存的識別碼
        function sanitizeKey(s) {
            return String(s).replace(/[^a-zA-Z0-9_\u4e00-\u9fff-]/g, '_');
        }

        // 組出呼叫 Apps Script 的完整網址，自動帶入房間代碼
        function apiUrl(params) {
            const usp = new URLSearchParams(Object.assign({ room: ROOM_ID }, params));
            return APPS_SCRIPT_URL + '?' + usp.toString();
        }

        // 題庫：boolean = 是非題（answer 為 true/false），choice = 選擇題（options + correctIndex）
        const QUESTIONS = [
            { id: 'q1', type: 'boolean', text: '戴手套可以取代洗手；只要手套沒有破損，就可以持續戴著照護不同病人或不同照護步驟。', answer: false, points: 10 },
            { id: 'q2', type: 'boolean', text: '本院洗手種類包含一般性洗手、消毒性洗手與外科刷手；一般性洗手可清除大部分暫時性細菌。', answer: true, points: 20 },
            { id: 'q3', type: 'boolean', text: 'WHO 提出的「洗手五時機」包括：接觸病人前、執行無菌/清潔操作前、暴觸體液後、接觸病人後、接觸病人週遭環境後。', answer: true, points: 10 },
            { id: 'q4', type: 'boolean', text: '病人手部有明顯髒污，或照護疑似困難梭狀桿菌（C. diff）感染病人後，只要用酒精性乾洗手液消毒即可，不需要用肥皂及清水洗手。', answer: false, points: 20 },
            { id: 'q5', type: 'boolean', text: '穿脫個人防護裝備（PPE）時，脫除的原則順序為：手套 → 護目鏡/面罩 → 隔離衣 → 口罩，脫除後應立即洗手。', answer: true, points: 20 },
            { id: 'q6', type: 'boolean', text: '發生針扎（尖銳物品扎傷）後，正確處置的第一步是立即擠出傷口血液，再以肥皂和大量清水沖洗傷口。', answer: true, points: 15 },
            { id: 'q7', type: 'boolean', text: '空氣傳染防護（Airborne Precautions）只要配戴外科口罩即可，不需要配戴 N95 等級呼吸防護具。', answer: false, points: 20 },
            { id: 'q8', type: 'boolean', text: '留置導尿管期間應盡量維持密閉式引流系統，且集尿袋應低於膀胱位置，以防止尿液逆流。', answer: true, points: 15 },
            { id: 'q9', type: 'boolean', text: '使用後的針具應立即將針頭回套針帽（re-cap），以避免刺傷他人。', answer: false, points: 20 },
            { id: 'q10', type: 'boolean', text: '置放中心靜脈導管（CVC）時應採最大無菌屏障（無菌長袍、無菌手套、口罩、髮帽及大範圍無菌單）。', answer: true, points: 15 },
            { id: 'q11', type: 'boolean', text: '外科手術部位感染（SSI）監測期通常為術後30天，若有植入物則依手術類別可延長至90天或1年。', answer: true, points: 15 },
            { id: 'q12', type: 'boolean', text: '照護不同病人之間，只要沒有明顯髒污，就不需要進行手部衛生。', answer: false, points: 10 },
            { id: 'mc1', type: 'choice', text: '依照 WHO 洗手五時機，下列何者「不」包括在內？', options: ['接觸病人前', '用餐前', '暴觸體液後', '接觸病人週遭環境後'], correctIndex: 1, points: 20 },
            { id: 'mc2', type: 'choice', text: '使用酒精性乾洗手液時，建議至少搓揉多久才能達到有效殺菌效果？', options: ['5 秒', '10 秒', '20～30 秒', '2 分鐘'], correctIndex: 2, points: 15 },
            { id: 'mc3', type: 'choice', text: '執行「接觸傳染防護」（Contact Precautions）時，最需要加強穿戴的防護裝備是？', options: ['N95 口罩', '手套與隔離衣', '護目鏡', '鉛衣'], correctIndex: 1, points: 15 },
            { id: 'mc4', type: 'choice', text: '發生針扎意外，除了立即處理傷口，接下來「最優先」該做的是？', options: ['自行上網查資料', '立即通報並依院內感染管制流程處理', '先觀察一週再說', '直接請假回家休息'], correctIndex: 1, points: 20 },
            { id: 'mc5', type: 'choice', text: '下列何者「不是」正確的醫療廢棄物分類方式？', options: ['尖銳物品丟入利器盒', '被血液污染的紗布視為感染性事業廢棄物', '將針具與一般垃圾混合丟棄', '生物性廢棄物依規定滅菌後處理'], correctIndex: 2, points: 20 }
        ];

        // 前端唯一的狀態物件，畫面完全依據這裡的值來 render()
        let state = {
            screen: 'login',       // 目前畫面：login / game / end
            playerId: '',          // 這名玩家的唯一識別碼（登入時產生）
            name: '',              // 玩家輸入的姓名／職稱
            questions: [],         // 這場作答要出的題目（依 id 順序，複製自 QUESTIONS）
            currentIndex: 0,       // 目前作答到第幾題
            score: 0,              // 目前累積分數（最低 0 分，不會變負數）
            correct: 0,            // 答對題數
            total: 0,              // 已作答題數
            feedback: null,        // （目前未使用，保留欄位）
            locked: false,         // 是否鎖定作答中的按鈕（送出答案到換下一題之間的過渡期）
            leaderboard: {},       // 從後端抓回來的排行榜資料（拿來算排名用）
            stats: {},             // 從後端抓回來的答錯率統計
            registrationOpen: true // 主辦人是否開放讓新玩家加入作答
        };

        let pollTimer = null;       // 輪詢用的計時器 id，換頁或重新排程時要先清掉舊的
        let lastKnownRegOpen = null; // 上一次輪詢時記錄的開放狀態，用來比對是否有變化

        // 統一的後端呼叫入口：帶著 action（list/update/logAnswer/reset/setRegistration...）
        // 打去 Apps Script，並把回傳的排行榜/統計/開放狀態同步進 state。失敗時不會拋錯中斷畫面，只印在 console。
        async function fetchState(action, extraParams) {
            try {
                const res = await fetch(apiUrl(Object.assign({ action: action }, extraParams || {})));
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                state.leaderboard = data.leaderboard || {};
                state.stats = data.stats || {};
                state.registrationOpen = (data.registrationOpen !== false);
                return data;
            } catch (e) {
                console.error('與伺服器溝通失敗:', e.message);
                return null;
            }
        }

        // 把「我」目前的分數/答對數/是否完成，回報給後端，讓其他人查排名時看得到最新資料
        async function updateMyEntry(finished) {
            if (!state.playerId) return;
            await fetchState('update', {
                playerId: sanitizeKey(state.playerId),
                name: state.name,
                score: state.score,
                correct: state.correct,
                total: state.total,
                finished: !!finished
            });
        }

        // 每答一題就順便回報這題的正確率統計（不影響玩家自己的分數）
        function logAnswerStat(questionId, isCorrect) {
            fetchState('logAnswer', { questionId: questionId, correct: !!isCorrect });
        }

        // 輕量輪詢：只用來偵測「開放/關閉作答」的狀態有沒有變化。
        // 若目前在登入畫面、且開放狀態跟上次不一樣，就自動重新渲染登入畫面。
        async function refreshLeaderboard() {
            await fetchState('list');
            if (state.screen === 'login' && state.registrationOpen !== lastKnownRegOpen) {
                lastKnownRegOpen = state.registrationOpen;
                render();
            } else {
                lastKnownRegOpen = state.registrationOpen;
            }
        }

        // 用遞迴 setTimeout（而非固定的 setInterval）排程下一次輪詢，
        // 每次間隔都是 30 秒基礎 + 0~15 秒隨機抖動，避免所有玩家同時打 API。
        function startPolling() {
            if (pollTimer) clearTimeout(pollTimer);
            const delay = 30000 + Math.random() * 15000; // 30 秒基礎 + 0~15 秒隨機抖動
            pollTimer = setTimeout(async () => {
                await refreshLeaderboard();
                startPolling();
            }, delay);
        }

        // 把目前抓到的排行榜資料，依「分數」由高到低排序（分數相同再比答對題數）
        function sortedEntries() {
            return Object.entries(state.leaderboard)
                .sort((a, b) => (b[1].score - a[1].score) || (b[1].correct - a[1].correct));
        }

        // 簡易的 HTML escape，避免玩家輸入的姓名裡有特殊字元破壞畫面結構
        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        // 依照 state.screen 畫出對應畫面（login / game / end），每次呼叫都會整個重畫 #app
        function render() {
            const app = document.getElementById('app');
            // ---- 登入畫面：輸入姓名並加入作答，若主辦人關閉報名則顯示提示 ----
            if (state.screen === 'login') {
                app.innerHTML = `
                    <div class="row g-3">
                      <div class="col-lg-8 mx-auto">
                        <div class="card">
                          <span class="ribbon-corner">🎀</span>
                          <p class="eyebrow">🎮 開始作答</p>
                          <h2>輸入你的姓名與職稱 加入擂台</h2>
                          ${state.registrationOpen ? `
                            <label for="nameInput">姓名 職稱</label>
                            <input id="nameInput" type="text" placeholder="例如：王小明護理師" maxlength="20">
                            <button class="btn btn-primary btn-block" id="joinBtn">🚀 加入作答</button>
                          ` : `
                            <div class="closed-msg">🚫 目前尚未開放加入作答，請稍候主辦人開放後再試一次</div>
                          `}
                        </div>
                      </div>
                    </div>
                `;
                if (state.registrationOpen) {
                    document.getElementById('joinBtn').onclick = onJoin;
                    document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') onJoin(); });
                }
            }
            // ---- 答題畫面：顯示目前分數、題目與答案按鈕（是非題或選擇題） ----
            else if (state.screen === 'game') {
                const q = state.questions[state.currentIndex];
                const pct = Math.round((state.currentIndex / state.questions.length) * 100);
                const answersHtml = q.type === 'choice'
                    ? `<div class="choice-list">${q.options.map((opt, idx) => `
                        <button class="choice-btn" id="choiceBtn${idx}" ${state.locked ? 'disabled' : ''}><span class="choice-letter">${String.fromCharCode(65 + idx)}</span>${escapeHtml(opt)}</button>
                      `).join('')}</div>`
                    : `<div class="answers">
                        <button class="ans-btn true" id="btnTrue" ${state.locked ? 'disabled' : ''}>⭕ 是 / 正確</button>
                        <button class="ans-btn false" id="btnFalse" ${state.locked ? 'disabled' : ''}>❌ 否 / 錯誤</button>
                      </div>`;
                app.innerHTML = `
                    <div class="row g-3">
                      <div class="col-lg-8 mx-auto">
                        <div class="card">
                          <span class="ribbon-corner">🎀</span>
                          <div class="dial-zone">
                            <div class="dial" id="dial">
                              <div class="dial-inner">
                                <div class="dial-score" id="scoreNum">${state.score}</div>
                                <div class="dial-label">目前分數</div>
                              </div>
                            </div>
                          </div>
                          <div class="progress-wrap">
                            第 ${state.currentIndex + 1} / ${state.questions.length} 題　<span class="name-chip">👤 ${escapeHtml(state.name)}</span>
                            <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
                          </div>
                          <div class="qcard">
                            <div class="qpoints">本題配分：${q.points} 分　${q.type === 'choice' ? '· 選擇題' : '· 是非題'}</div>
                            <div class="qtext">${escapeHtml(q.text)}</div>
                          </div>
                          ${answersHtml}
                          <div class="feedback" id="feedbackZone">${state.locked ? '📮 已送出，前往下一題…' : ''}</div>
                        </div>
                      </div>
                    </div>
                `;
                if (q.type === 'choice') {
                    q.options.forEach((opt, idx) => {
                        document.getElementById('choiceBtn' + idx).onclick = () => answer(idx);
                    });
                } else {
                    document.getElementById('btnTrue').onclick = () => answer(true);
                    document.getElementById('btnFalse').onclick = () => answer(false);
                }
            }
            // ---- 結算畫面：顯示總分、答對題數與目前排名，並施放彩帶特效 ----
            else if (state.screen === 'end') {
                const entries = sortedEntries();
                const myRank = entries.findIndex(([id]) => id === state.playerId) + 1;
                app.innerHTML = `
                    <div class="row g-3">
                      <div class="col-lg-8 mx-auto">
                        <div class="card">
                          <span class="ribbon-corner">🎀</span>
                          <span class="trophy">👑</span>
                          <p class="eyebrow text-center">作答完成</p>
                          <h2 class="text-center">${escapeHtml(state.name)}，你的結果出爐了！</h2>
                          <p class="sub text-center">${myRank > 0 ? `目前排名第 ${myRank} 名` : ''}</p>
                          <div class="end-stats">
                            <div class="stat"><div class="num">${state.score}</div><div class="lbl">總分</div></div>
                            <div class="stat"><div class="num">${state.correct}/${state.total}</div><div class="lbl">答對題數</div></div>
                            <div class="stat"><div class="num">${myRank > 0 ? ('#' + myRank) : '-'}</div><div class="lbl">目前排名</div></div>
                          </div>
                          <p class="sub text-center" style="margin:0;">🎉 感謝作答，本次題組已全部完成！</p>
                        </div>
                      </div>
                    </div>
                `;
                launchConfetti();
            }
        }

        // 點擊「加入作答」時觸發：驗證姓名、初始化這場作答的狀態，並切換到答題畫面
        function onJoin() {
            const input = document.getElementById('nameInput');
            const name = (input.value || '').trim();
            if (!name) {
                input.focus();
                input.style.borderColor = 'var(--coral)'; // 沒填姓名就標紅提示
                return;
            }
            state.name = name;
            state.playerId = sanitizeKey(name) + '_' + Math.random().toString(36).slice(2, 6); // 姓名+隨機字串，避免撞名
            state.questions = QUESTIONS.slice(); // 依 id 順序出題，不隨機
            state.currentIndex = 0;
            state.score = 0;
            state.correct = 0;
            state.total = 0;
            state.feedback = null;
            state.locked = false;
            state.screen = 'game';
            updateMyEntry(false); // 先跟後端登記一筆分數 0 的紀錄，讓排行榜馬上看得到這個人
            render();
        }

        // 玩家送出答案時觸發。selected 是非題傳 true/false，選擇題傳選項索引。
        // 不會顯示「正確答案是什麼」，只會鎖住按鈕並顯示「已送出」，0.5 秒後自動跳下一題。
        function answer(selected) {
            if (state.locked) return; // 防止同一題重複送出
            state.locked = true;
            const q = state.questions[state.currentIndex];
            const isCorrect = q.type === 'choice' ? (selected === q.correctIndex) : (selected === q.answer);
            const delta = isCorrect ? q.points : -0; // 答對加分，答錯不扣分（目前設定）
            state.score = Math.max(0, state.score + delta); // 分數不會低於 0
            state.total += 1;
            if (isCorrect) state.correct += 1;

            const scoreNum = document.getElementById('scoreNum');
            if (scoreNum) scoreNum.textContent = state.score; // 直接更新分數圓盤，不用整頁重畫

            // 鎖住這一題的所有按鈕，避免使用者連點
            if (q.type === 'choice') {
                q.options.forEach((opt, idx) => {
                    const btn = document.getElementById('choiceBtn' + idx);
                    if (!btn) return;
                    btn.disabled = true;
                    if (idx === selected) btn.classList.add('selected'); // 只標示「你選了哪個」，不標示對錯
                });
            } else {
                document.getElementById('btnTrue').disabled = true;
                document.getElementById('btnFalse').disabled = true;
            }
            const fz = document.getElementById('feedbackZone');
            if (fz) fz.textContent = '📮 已送出，前往下一題…';

            logAnswerStat(q.id, isCorrect); // 回報這題的答對/答錯率統計

            const isLast = (state.currentIndex + 1) >= state.questions.length;
            updateMyEntry(isLast); // 同步最新分數給後端；如果是最後一題就順便標記完成

            // 停頓 0.5 秒讓玩家看到「已送出」的回饋，再切換到下一題或結算畫面
            setTimeout(() => {
                state.currentIndex += 1;
                state.locked = false;
                if (state.currentIndex >= state.questions.length) {
                    state.screen = 'end';
                }
                render();
            }, 500);
        }

        // 【主辦人用】清空所有玩家的排行榜與統計資料，會先跳出確認視窗
        async function onResetBoard() {
            if (!confirm('確定要清空所有玩家的排行榜與答錯率統計資料嗎？此動作無法復原。')) return;
            await fetchState('reset');
            render();
        }

        // 【主辦人用】切換「是否開放新玩家加入作答」
        async function onToggleRegistration() {
            const newOpen = !state.registrationOpen;
            await fetchState('setRegistration', { open: newOpen });
            render();
        }

        /* ---------------------------------------------------------------
           ✨ 蘿莉風視覺特效：飄浮裝飾 / 點擊亮片 / 結算彩帶
           （純視覺效果，不影響任何題目邏輯與正確答案顯示）
           --------------------------------------------------------------- */
        const FLOATY_EMOJI = ['💗', '⭐', '🎀', '✨', '🫧', '🌸'];

        // 在背景產生一批會往上飄的裝飾 emoji（愛心/星星/緞帶等），純視覺、不影響互動
        function initFloatingBG() {
            const layer = document.getElementById('floatyLayer');
            if (!layer) return;
            const count = window.innerWidth < 600 ? 12 : 20; // 手機少放一點，避免太擁擠
            for (let i = 0; i < count; i++) {
                const span = document.createElement('span');
                span.className = 'floaty';
                span.textContent = FLOATY_EMOJI[Math.floor(Math.random() * FLOATY_EMOJI.length)];
                span.style.left = Math.random() * 100 + 'vw';
                span.style.fontSize = (0.9 + Math.random() * 1.3) + 'rem';
                const duration = 9 + Math.random() * 10;
                span.style.animationDuration = duration + 's';
                span.style.animationDelay = (Math.random() * duration) + 's'; // 隨機延遲讓每個一開始就錯開
                layer.appendChild(span);
            }
        }

        const SPARKLE_EMOJI = ['✨', '💖', '⭐', '🌟'];
        // 在指定座標生成一個亮片 emoji，短暫飄一下就自動消失
        function spawnSparkle(x, y) {
            const el = document.createElement('div');
            el.className = 'tap-sparkle';
            el.textContent = SPARKLE_EMOJI[Math.floor(Math.random() * SPARKLE_EMOJI.length)];
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 720); // 動畫播完就從 DOM 移除，避免累積
        }

        // 只要點到按鈕類元素（一般按鈕/選擇題/是非題/分頁按鈕），就在點擊處噴一個亮片
        document.addEventListener('click', (e) => {
            const target = e.target.closest('.btn, .choice-btn, .ans-btn, .lb-page-btn');
            if (!target) return;
            spawnSparkle(e.clientX, e.clientY);
        });

        const CONFETTI_COLORS = ['#FF7EB6', '#C9A6FF', '#9BE8CC', '#FFD966', '#7FE0E8', '#FF8FA3'];
        // 結算畫面用的彩帶特效：噴出 60 片會飄落旋轉的彩色紙片
        function launchConfetti() {
            const n = 60;
            for (let i = 0; i < n; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                const size = 6 + Math.random() * 8;
                piece.style.left = Math.random() * 100 + 'vw';
                piece.style.width = size + 'px';
                piece.style.height = (size * 0.4) + 'px';
                piece.style.background = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
                piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px'; // 隨機圓形或方形紙片
                const duration = 2.4 + Math.random() * 1.8;
                piece.style.animationDuration = duration + 's';
                piece.style.animationDelay = (Math.random() * 0.6) + 's';
                document.body.appendChild(piece);
                setTimeout(() => piece.remove(), (duration + 1) * 1000); // 落地後清掉，避免 DOM 越堆越多
            }
        }

        // 頁面載入後的初始化流程：
        // 1) 先鋪好飄浮背景特效
        // 2) 跟後端要一次目前的排行榜/開放狀態（結算排名跟登入畫面都會用到）
        // 3) 畫出第一個畫面（登入畫面）
        // 4) 啟動輕量輪詢，持續偵測開放狀態是否改變
        (async function init() {
            initFloatingBG();
            await fetchState('list');
            lastKnownRegOpen = state.registrationOpen;
            render();
            startPolling();
        })();
    </script>
</body>
</html>
